<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://pllv4.streamwaveprod.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-ancestors 'none';">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerLift Live | JV Team Standings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        .btn-home {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn-home:hover {
            background: rgba(30, 41, 59, 1);
            transform: translateY(-2px);
            color: white;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #f59e0b;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .dashboard {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 15px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .dashboard h2 {
            color: #60a5fa;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .podium {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 15px;
        }

        .podium-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            border-left: 5px solid rgba(96, 165, 250, 0.4);
        }

        .podium-card.first {
            border-left-color: #fbbf24;
            background: rgba(251, 191, 36, 0.08);
        }

        .podium-card.second {
            border-left-color: #94a3b8;
            background: rgba(148, 163, 184, 0.08);
        }

        .podium-card.third {
            border-left-color: #cd7f32;
            background: rgba(205, 127, 50, 0.08);
        }

        .podium-card .medal {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .podium-card .team-name {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
        }

        .podium-card .points {
            font-size: 1.5rem;
            font-weight: 800;
            color: #60a5fa;
        }

        .podium-card .label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .school-card {
            background: rgba(255, 115, 0, 0.1);
            border: 2px solid rgba(255, 115, 0, 0.4);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .school-card h3 {
            color: #ff7300;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .school-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
        }

        .school-stat {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 115, 0, 0.3);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .school-stat .value {
            font-size: 1.4rem;
            font-weight: 800;
            color: #60a5fa;
        }

        .school-stat .label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .team-table {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 15px;
            padding: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            overflow-x: auto;
        }

        .team-table h3 {
            color: #60a5fa;
            margin-bottom: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 8px 10px;
            text-align: center;
            border: 1px solid rgba(96, 165, 250, 0.15);
        }

        th {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            color: rgba(255, 255, 255, 0.85);
        }

        td:first-child, th:first-child {
            text-align: left;
            font-weight: 600;
        }

        tbody tr:nth-child(even) {
            background: rgba(15, 23, 42, 0.3);
        }

        tbody tr:hover {
            background: rgba(96, 165, 250, 0.1);
            transition: background 0.2s;
        }

        .total-column {
            background: rgba(96, 165, 250, 0.15) !important;
            font-weight: 800;
            font-size: 1rem;
            color: #60a5fa !important;
        }

        .points-column {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
        }

        .school-row {
            background: rgba(255, 115, 0, 0.12) !important;
            border-left: 3px solid #ff7300;
        }

        .school-row td {
            font-weight: 700;
            color: white !important;
        }

        .school-row .total-column {
            color: #ff7300 !important;
        }

        .rank-column {
            font-size: 1.1rem;
            font-weight: 800;
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="container px-4">
        <!-- Navigation -->
        <div class="mb-4" style="display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; align-items: center;">
            <a href="index.html" class="btn-home" style="white-space: nowrap; flex-shrink: 0;">
                <i class="fas fa-home me-2"></i>Home
            </a>
            <a href="team.html" class="btn-home" style="white-space: nowrap; flex-shrink: 0;">
                <i class="fas fa-trophy me-2"></i>Varsity Team
            </a>
            <button id="refreshToggle" onclick="toggleAutoRefresh()" class="btn-home" style="background: rgba(96, 165, 250, 0.8); border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0;">
                <i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF
            </button>
            
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="fas fa-trophy me-3"></i>PowerLift Live — JV Team Standings</h1>
            <p>JV Team Rankings by Total Points</p>
        </div>

        <input type="hidden" id="sheetUrl">
        <div id="dashboard"></div>
        <div id="tableContainer"></div>

        <div id="loadingStatus" style="display: none;"></div>
    </div>

    <script>
        let autoRefreshInterval = null;

        function toggleAutoRefresh() {
            const btn = document.getElementById('refreshToggle');
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF';
                btn.style.background = 'rgba(96, 165, 250, 0.8)';
                localStorage.setItem('jvTeamAutoRefresh', 'off');
            } else {
                const cfg = JSON.parse(localStorage.getItem('trplConfig') || '{}');
                const intervalMs = (cfg.autoRefreshSeconds || 20) * 1000;
                autoRefreshInterval = setInterval(function() {
                    loadTeamData(true);
                }, intervalMs);
                btn.innerHTML = '<i class="fas fa-sync-alt fa-spin me-2"></i>Auto-Refresh: ON';
                btn.style.background = 'rgba(16, 185, 129, 0.8)';
                localStorage.setItem('jvTeamAutoRefresh', 'on');
                loadTeamData();
            }
        }

        // On page load, auto-load from configuration using the JV team sheet
        window.addEventListener('DOMContentLoaded', function() {
            const configStr = localStorage.getItem('trplConfig');
            if (configStr) {
                try {
                    const config = JSON.parse(configStr);

                    // Use sheet containing "jv team", fallback to sheet containing "mens jv team"
                    const teamSheet = (config.sheets && config.sheets.find(s =>
                        s.name.toLowerCase().includes('jv team')
                    )) || null;

                    if (teamSheet) {
                        const sheetUrl = `https://docs.google.com/spreadsheets/d/${config.spreadsheetId}/edit#gid=${teamSheet.gid}`;
                        document.getElementById('sheetUrl').value = sheetUrl;
                        document.querySelector('.page-header h1').innerHTML =
                            `<i class="fas fa-trophy me-3"></i>${teamSheet.name}`;
                        document.querySelector('.page-header p').textContent = 'JV Team Rankings by Total Points';
                        console.log(`Auto-loading JV team sheet: ${teamSheet.name}...`);
                        loadTeamData();
                    } else {
                        const statusDiv = document.getElementById('loadingStatus');
                        statusDiv.textContent = 'No JV team sheet found in configuration. Make sure a sheet with "JV Team" in the name is configured in Setup.';
                        statusDiv.style.color = '#ff9800';
                        statusDiv.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error loading configuration:', error);
                }
            }

            if (localStorage.getItem('jvTeamAutoRefresh') === 'on') {
                toggleAutoRefresh();
            }
        });

        function parseSheetUrl(url) {
            const spreadsheetIdMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            const gidMatch = url.match(/[#&]gid=([0-9]+)/);

            if (spreadsheetIdMatch) {
                return {
                    spreadsheetId: spreadsheetIdMatch[1],
                    gid: gidMatch ? gidMatch[1] : '0'
                };
            }
            return null;
        }

        function updateCacheBadge(cacheHit, cacheAge) { /* handled by checkHeartbeat */ }

        function parseCSV(text) {
            const lines = text.split(/\r\n|\n|\r/);
            const result = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const values = [];
                let current = '';
                let inQuotes = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];

                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                result.push(values);
            }

            return result;
        }

        async function loadTeamData(preserveScroll = false) {
            const urlInput = document.getElementById('sheetUrl');
            const statusDiv = document.getElementById('loadingStatus');
            const url = urlInput.value.trim();

            const scrollPosition = preserveScroll ? window.pageYOffset || document.documentElement.scrollTop : 0;

            if (!url) {
                statusDiv.textContent = 'No JV team sheet URL found. Please configure the JV team sheet in Setup.';
                statusDiv.style.color = '#d32f2f';
                statusDiv.style.display = 'block';
                return;
            }

            statusDiv.textContent = 'Loading JV team data...';
            statusDiv.style.color = '#667eea';
            statusDiv.style.display = 'block';

            try {
                const parsed = parseSheetUrl(url);
                if (!parsed) {
                    throw new Error('Invalid Google Sheet URL');
                }

                const csvUrl = `https://pllv4.streamwaveprod.com/cache/sheet_${parsed.spreadsheetId}_${parsed.gid}.csv`;

                const response = await fetch(csvUrl);
                if (!response.ok) {
                    throw new Error(`Failed to fetch data: ${response.status}. Make sure the Google Sheet is set to "Anyone with the link can view".`);
                }
                updateCacheBadge(response.headers.get('X-Cache') || 'MISS', response.headers.get('X-Cache-Age'));
                checkHeartbeat();

                const csvText = await response.text();
                const csvData = parseCSV(csvText);

                console.log('JV team data loaded:', csvData.length, 'rows');

                renderTeamStats(csvData);

                const now = new Date();
                const timeStr = now.toLocaleTimeString();
                statusDiv.innerHTML = `✓ Loaded <strong>Mens JV Team</strong> (Last updated: ${timeStr})`;
                statusDiv.style.color = '#4caf50';

                if (preserveScroll && scrollPosition > 0) {
                    setTimeout(() => {
                        window.scrollTo(0, scrollPosition);
                    }, 100);
                }

            } catch (error) {
                statusDiv.textContent = `Error: ${error.message}`;
                statusDiv.style.color = '#d32f2f';
                console.error('Error loading JV team data:', error);
            }
        }

        function renderTeamStats(csvData) {
            const dashboard = document.getElementById('dashboard');
            const tableContainer = document.getElementById('tableContainer');

            dashboard.innerHTML = '';
            tableContainer.innerHTML = '';

            if (csvData.length < 2) {
                tableContainer.innerHTML = '<p style="color: rgba(255,255,255,0.7); text-align: center; padding: 20px;">No team data found</p>';
                return;
            }

            let headerRow = -1;
            let teamCol = -1, totalCol = -1;
            let pointCols = [];

            for (let i = 0; i < Math.min(10, csvData.length); i++) {
                const row = csvData[i];
                let foundTotal = -1, foundTeam = -1;
                const foundPoints = [];

                for (let j = 6; j < row.length; j++) {
                    const cell = (row[j] || '').toLowerCase().trim();

                    if (cell === 'team' || cell === 'school' || cell === 'school name' || cell === 'team name') foundTeam = j;
                    if (cell === 'total' || cell === 'total pts' || cell === 'team total' || cell === 'total points') foundTotal = j;
                    if (cell.match(/^\d{3}$/) || cell.match(/^\d{3}\/\d{3}$/)) foundPoints.push(j);
                }

                if (foundTotal !== -1) {
                    headerRow = i;
                    totalCol = foundTotal;
                    pointCols = foundPoints;
                    if (foundTeam !== -1) {
                        teamCol = foundTeam;
                    } else {
                        for (let dr = i + 1; dr < Math.min(i + 4, csvData.length); dr++) {
                            for (let j = 6; j < csvData[dr].length; j++) {
                                const val = (csvData[dr][j] || '').trim();
                                if (val && isNaN(val) && j !== totalCol) { teamCol = j; break; }
                            }
                            if (teamCol !== -1) break;
                        }
                    }
                    break;
                }
            }

            console.log('Final - Team:', teamCol, 'Total:', totalCol, 'Header row:', headerRow);

            if (teamCol === -1 || totalCol === -1) {
                const statusDiv = document.getElementById('loadingStatus');
                statusDiv.innerHTML = `⚠️ Warning: Could not find Team (${teamCol}) or Total (${totalCol}) column.
                    Make sure you're loading the "Mens JV Team" sheet.`;
                statusDiv.style.color = '#ff9800';
            }

            const startRow = headerRow !== -1 ? headerRow + 1 : 1;
            let teamsData = [];
            const cfgStr = localStorage.getItem('trplConfig');
            const configuredSchool = cfgStr ? (JSON.parse(cfgStr).schoolName || '').toLowerCase() : '';

            const seenTeams = {};
            for (let i = startRow; i < csvData.length; i++) {
                const row = csvData[i];
                if (!row.some(cell => cell && cell.trim())) continue;

                const teamName = teamCol !== -1 ? (row[teamCol] || '').trim() : '';
                if (!teamName) continue;

                const totalPoints = totalCol !== -1 ? parseFloat(row[totalCol]) || 0 : 0;

                const key = teamName.toLowerCase();
                if (!seenTeams[key] || totalPoints > seenTeams[key].total) {
                    seenTeams[key] = {
                        row: row,
                        total: totalPoints,
                        isMySchool: configuredSchool && teamName.toLowerCase().includes(configuredSchool)
                    };
                }
            }
            teamsData = Object.values(seenTeams);

            teamsData.sort((a, b) => b.total - a.total);

            console.log('JV teams sorted by total:', teamsData.map(t => ({name: t.row[teamCol], total: t.total})));

            const pageHeading = document.querySelector('.page-header h1');
            const sheetTitle = pageHeading ? pageHeading.textContent.trim() : 'JV Team Standings';
            let tableHTML = `<div class="team-table"><h3>${sheetTitle} (Sorted by Total Points)</h3><table>`;
            tableHTML += '<thead><tr>';

            tableHTML += '<th>Rank</th>';

            if (headerRow !== -1) {
                csvData[headerRow].forEach((header, idx) => {
                    if (idx >= 6) tableHTML += `<th>${header || ''}</th>`;
                });
            }
            tableHTML += '</tr></thead><tbody>';

            teamsData.forEach((teamData, rank) => {
                const row = teamData.row;

                tableHTML += teamData.isMySchool ? '<tr class="school-row">' : '<tr>';
                tableHTML += `<td class="rank-column">${rank + 1}</td>`;

                row.forEach((cell, idx) => {
                    if (idx < 6) return;
                    let cellClass = '';
                    if (totalCol !== -1 && idx === totalCol) cellClass = 'total-column';
                    else if (pointCols.includes(idx) && cell && !isNaN(cell)) cellClass = 'points-column';
                    tableHTML += `<td class="${cellClass}">${cell || ''}</td>`;
                });

                tableHTML += '</tr>';
            });

            tableHTML += '</tbody></table></div>';
            tableContainer.innerHTML = tableHTML;

            buildDashboard(csvData, headerRow, teamCol, totalCol);
        }

        function buildDashboard(csvData, headerRow, teamCol, totalCol) {
            const dashboard = document.getElementById('dashboard');

            if (headerRow === -1 || teamCol === -1 || totalCol === -1) {
                console.log('Dashboard not built - missing columns:', { headerRow, teamCol, totalCol });
                dashboard.innerHTML = `
                    <div style="background: rgba(96, 165, 250, 0.1); border: 2px solid #60a5fa; border-radius: 10px; padding: 20px; margin-bottom: 20px; text-align: center; color: #60a5fa;">
                        <h3 style="margin-bottom: 10px;">⚠️ Dashboard Not Available</h3>
                        <p>Could not detect required columns. Check the sheet structure.</p>
                    </div>
                `;
                return;
            }

            const configStr = localStorage.getItem('trplConfig');
            const schoolName = configStr ? (JSON.parse(configStr).schoolName || '') : '';

            const seenDash = {};
            const startRow = headerRow + 1;

            for (let i = startRow; i < csvData.length; i++) {
                const row = csvData[i];
                if (!row.some(cell => cell && cell.trim())) continue;

                const teamName = (row[teamCol] || '').trim();
                const totalPoints = parseFloat(row[totalCol]) || 0;

                if (!teamName || totalPoints <= 0) continue;

                const key = teamName.toLowerCase();
                if (!seenDash[key] || totalPoints > seenDash[key].points) {
                    seenDash[key] = {
                        name: teamName,
                        points: totalPoints,
                        isMySchool: schoolName && teamName.toLowerCase().includes(schoolName.toLowerCase())
                    };
                }
            }

            const teams = Object.values(seenDash);

            teams.sort((a, b) => b.points - a.points);

            const mySchoolTeam = teams.find(t => t.isMySchool);
            const mySchoolRank = teams.findIndex(t => t.isMySchool) + 1;

            let dashboardHTML = '<div class="dashboard">';
            dashboardHTML += '<h2><i class="fas fa-trophy me-2"></i>Leaderboard</h2>';

            dashboardHTML += '<div class="podium">';
            const medals = ['🥇', '🥈', '🥉'];
            const podiumClasses = ['first', 'second', 'third'];

            for (let i = 0; i < Math.min(3, teams.length); i++) {
                const team = teams[i];
                dashboardHTML += `
                    <div class="podium-card ${podiumClasses[i]}">
                        <div class="medal">${medals[i]}</div>
                        <div class="team-name">${team.name}</div>
                        <div class="points">${team.points}</div>
                        <div class="label">Total Points</div>
                    </div>
                `;
            }

            dashboardHTML += '</div>';

            if (mySchoolTeam) {
                const pointsBehindLeader = teams[0].points - mySchoolTeam.points;

                dashboardHTML += `
                    <div class="school-card">
                        <h3><i class="fas fa-school me-2"></i>${mySchoolTeam.name} Performance</h3>
                        <div class="school-stats">
                            <div class="school-stat">
                                <div class="value">#${mySchoolRank}</div>
                                <div class="label">Current Rank</div>
                            </div>
                            <div class="school-stat">
                                <div class="value">${mySchoolTeam.points}</div>
                                <div class="label">Total Points</div>
                            </div>
                            <div class="school-stat">
                                <div class="value">${pointsBehindLeader === 0 ? '🏆' : '-' + pointsBehindLeader}</div>
                                <div class="label">${pointsBehindLeader === 0 ? 'Leading!' : 'From Leader'}</div>
                            </div>
                            <div class="school-stat">
                                <div class="value">${teams.length}</div>
                                <div class="label">Total Teams</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            dashboardHTML += '</div>';
            dashboard.innerHTML = dashboardHTML;
        }

        async function checkHeartbeat() {
            try {
                const r = await fetch('https://pllv4.streamwaveprod.com/cache/heartbeat.json?_=' + Date.now());
                if (!r.ok) return;
                const data = await r.json();
                const ageSecs = Math.floor(Date.now() / 1000) - data.ts;
                const btn = document.getElementById('refreshToggle');
                if (!btn) return;
                if (ageSecs > 30) {
                    const mins = Math.floor(ageSecs / 60);
                    const secs = ageSecs % 60;
                    const ageStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
                    btn.style.background = 'rgba(239,68,68,0.8)';
                    btn.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>Data Stale · ${ageStr}`;
                } else {
                    // Data is fresh — restore normal button appearance if it was showing stale
                    if (btn.innerHTML.includes('Data Stale')) {
                        btn.style.background = 'rgba(96,165,250,0.8)';
                        const isOn = !!window.autoRefreshInterval;
                        btn.innerHTML = isOn
                            ? '<i class="fas fa-sync-alt fa-spin me-2"></i>Auto-Refresh: ON'
                            : '<i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF';
                    }
                }
            } catch(e) { /* network error — ignore */ }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
