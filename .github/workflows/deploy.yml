name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 74.208.218.126
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "*.html,*.js,*.svg,*.png"
          target: /var/www/html/
