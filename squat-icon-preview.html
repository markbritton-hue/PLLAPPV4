<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://pllv4.streamwaveprod.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-ancestors 'none';">
    <title>Squat Icon Preview</title>
    <style>
        body {
            background: #f1f5f9;
            display: flex;
            gap: 50px;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .icon-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .icon-box span {
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Small size (app size) -->
    <div class="icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 76" width="48" height="48" fill="black" stroke="black" stroke-linecap="round" stroke-linejoin="round">
            <!-- Head -->
            <circle cx="36" cy="7" r="6" stroke="none"/>
            <!-- Neck -->
            <line x1="36" y1="13" x2="36" y2="17" stroke-width="6" fill="none"/>
            <!-- Left shoulder -->
            <line x1="36" y1="17" x2="19" y2="22" stroke-width="6" fill="none"/>
            <!-- Right shoulder -->
            <line x1="36" y1="17" x2="53" y2="22" stroke-width="6" fill="none"/>
            <!-- Left arm to bar -->
            <line x1="19" y1="22" x2="7" y2="19" stroke-width="5" fill="none"/>
            <!-- Right arm to bar -->
            <line x1="53" y1="22" x2="65" y2="19" stroke-width="5" fill="none"/>
            <!-- Barbell shaft -->
            <line x1="2" y1="19" x2="70" y2="19" stroke-width="2.5" fill="none"/>
            <!-- Left plate -->
            <rect x="0" y="13" width="5" height="12" rx="1" stroke="none"/>
            <!-- Right plate -->
            <rect x="67" y="13" width="5" height="12" rx="1" stroke="none"/>
            <!-- Torso (slight forward lean) -->
            <line x1="36" y1="19" x2="33" y2="41" stroke-width="13" fill="none"/>
            <!-- Left thigh -->
            <line x1="33" y1="41" x2="12" y2="57" stroke-width="11" fill="none"/>
            <!-- Left shin -->
            <line x1="12" y1="57" x2="14" y2="70" stroke-width="9" fill="none"/>
            <!-- Right thigh -->
            <line x1="33" y1="41" x2="56" y2="57" stroke-width="11" fill="none"/>
            <!-- Right shin -->
            <line x1="56" y1="57" x2="54" y2="70" stroke-width="9" fill="none"/>
            <!-- Left foot -->
            <line x1="6" y1="70" x2="22" y2="70" stroke-width="5" fill="none"/>
            <!-- Right foot -->
            <line x1="46" y1="70" x2="62" y2="70" stroke-width="5" fill="none"/>
        </svg>
        <span>App size (48px)</span>
    </div>

    <!-- Large preview - light bg -->
    <div class="icon-box" style="background:white; padding:30px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 76" width="120" height="120" fill="black" stroke="black" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="36" cy="7" r="6" stroke="none"/>
            <line x1="36" y1="13" x2="36" y2="17" stroke-width="6" fill="none"/>
            <line x1="36" y1="17" x2="19" y2="22" stroke-width="6" fill="none"/>
            <line x1="36" y1="17" x2="53" y2="22" stroke-width="6" fill="none"/>
            <line x1="19" y1="22" x2="7" y2="19" stroke-width="5" fill="none"/>
            <line x1="53" y1="22" x2="65" y2="19" stroke-width="5" fill="none"/>
            <line x1="2" y1="19" x2="70" y2="19" stroke-width="2.5" fill="none"/>
            <rect x="0" y="13" width="5" height="12" rx="1" stroke="none"/>
            <rect x="67" y="13" width="5" height="12" rx="1" stroke="none"/>
            <line x1="36" y1="19" x2="33" y2="41" stroke-width="13" fill="none"/>
            <line x1="33" y1="41" x2="12" y2="57" stroke-width="11" fill="none"/>
            <line x1="12" y1="57" x2="14" y2="70" stroke-width="9" fill="none"/>
            <line x1="33" y1="41" x2="56" y2="57" stroke-width="11" fill="none"/>
            <line x1="56" y1="57" x2="54" y2="70" stroke-width="9" fill="none"/>
            <line x1="6" y1="70" x2="22" y2="70" stroke-width="5" fill="none"/>
            <line x1="46" y1="70" x2="62" y2="70" stroke-width="5" fill="none"/>
        </svg>
        <span>Light bg</span>
    </div>

    <!-- Large preview - dark bg -->
    <div class="icon-box" style="background:#1e293b; padding:30px; border-radius:16px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 76" width="120" height="120" fill="white" stroke="white" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="36" cy="7" r="6" stroke="none"/>
            <line x1="36" y1="13" x2="36" y2="17" stroke-width="6" fill="none"/>
            <line x1="36" y1="17" x2="19" y2="22" stroke-width="6" fill="none"/>
            <line x1="36" y1="17" x2="53" y2="22" stroke-width="6" fill="none"/>
            <line x1="19" y1="22" x2="7" y2="19" stroke-width="5" fill="none"/>
            <line x1="53" y1="22" x2="65" y2="19" stroke-width="5" fill="none"/>
            <line x1="2" y1="19" x2="70" y2="19" stroke-width="2.5" fill="none"/>
            <rect x="0" y="13" width="5" height="12" rx="1" stroke="none"/>
            <rect x="67" y="13" width="5" height="12" rx="1" stroke="none"/>
            <line x1="36" y1="19" x2="33" y2="41" stroke-width="13" fill="none"/>
            <line x1="33" y1="41" x2="12" y2="57" stroke-width="11" fill="none"/>
            <line x1="12" y1="57" x2="14" y2="70" stroke-width="9" fill="none"/>
            <line x1="33" y1="41" x2="56" y2="57" stroke-width="11" fill="none"/>
            <line x1="56" y1="57" x2="54" y2="70" stroke-width="9" fill="none"/>
            <line x1="6" y1="70" x2="22" y2="70" stroke-width="5" fill="none"/>
            <line x1="46" y1="70" x2="62" y2="70" stroke-width="5" fill="none"/>
        </svg>
        <span style="color:#94a3b8;">Dark bg</span>
    </div>

</body>
</html>
