<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-ancestors 'none';">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerLift Live | Enter Access Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .unlock-box {
            background: rgba(30,41,59,0.85);
            border: 1px solid rgba(96,165,250,0.25);
            border-radius: 20px;
            padding: 44px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .role-icon { font-size: 2.8rem; margin-bottom: 16px; }
        h1 { font-size: 1.6rem; font-weight: 800; color: white; margin-bottom: 6px; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 28px; }
        .code-input {
            background: rgba(15,23,42,0.8);
            border: 1px solid rgba(96,165,250,0.3);
            border-radius: 10px;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: monospace;
            text-align: center;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 14px;
            width: 100%;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .code-input:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.15); }
        .code-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 0.05em; font-size: 1rem; font-weight: 400; }
        .btn-unlock {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; color: white; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-unlock:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #f87171; font-size: 0.88rem; margin-top: 12px; min-height: 20px; }
        .back-link { color: rgba(255,255,255,0.35); font-size: 0.82rem; margin-top: 20px; display: inline-block; text-decoration: none; }
        .back-link:hover { color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <div class="unlock-box">
        <div class="role-icon" id="roleIcon"></div>
        <h1 id="roleTitle">Enter Access Code</h1>
        <p class="subtitle" id="roleSubtitle">Enter your school's access code to continue</p>

        <input type="text" class="code-input" id="codeInput" placeholder="SCHOOL CODE"
            maxlength="20" oninput="this.value=this.value.toUpperCase()"
            onkeydown="if(event.key==='Enter') submitCode()">

        <button class="btn-unlock" id="unlockBtn" onclick="submitCode()">
            <i class="fas fa-unlock"></i> Unlock
        </button>
        <div class="error-msg" id="errorMsg"></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left" style="margin-right:5px;"></i>Back</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" integrity="sha384-sEVIly94UBRLKWdkYoPpSG7GD/e79YHMrxVyZaOk712Ga7+EAw6w1EFi+xBzBdd+" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" integrity="sha384-M481iNZJtbpypKgvlvZ+78Giq0BsewFLk5r2k+MOcGXlwKCc27DQRZ+WCV/zpmpC" crossorigin="anonymous"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB5FKrs0rys3ODV2U36YFjJWUu_BgFuDZk",
            authDomain: "powerlift-live.firebaseapp.com",
            projectId: "powerlift-live",
            storageBucket: "powerlift-live.firebasestorage.app",
            messagingSenderId: "298820185512",
            appId: "1:298820185512:web:4bccfb5a26ff4acf0b4c67"
        });
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'athlete';

        const roles = {
            athlete: { icon: '<i class="fas fa-person-running" style="color:#60a5fa;"></i>', title: 'Athlete Access', color: '#3b82f6' },
            coach:   { icon: '<i class="fas fa-clipboard-list" style="color:#10b981;"></i>', title: 'Coach Access',   color: '#10b981' }
        };
        const r = roles[role] || roles.athlete;
        document.getElementById('roleIcon').innerHTML = r.icon;
        document.getElementById('roleTitle').textContent = r.title;
        document.getElementById('unlockBtn').style.background = r.color;
        document.getElementById('unlockBtn').style.boxShadow = `0 4px 14px ${r.color}55`;

        async function submitCode() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            const btn  = document.getElementById('unlockBtn');
            const err  = document.getElementById('errorMsg');
            if (!code) { err.textContent = 'Please enter your school code.'; return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking…';
            err.textContent = '';

            try {
                const snap = await db.collection('schoolCodes')
                    .where('code', '==', code)
                    .where('active', '==', true)
                    .limit(1)
                    .get();

                if (snap.empty) {
                    err.textContent = 'Code not found or inactive. Check with your coach.';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-unlock"></i> Unlock';
                    return;
                }

                const school = snap.docs[0].data();

                // Check expiry
                if (school.expiresAt) {
                    const today = new Date(); today.setHours(0,0,0,0);
                    const expiry = new Date(school.expiresAt);
                    if (expiry < today) {
                        err.textContent = 'This access code has expired. Contact your meet director.';
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-unlock"></i> Unlock';
                        return;
                    }
                }

                localStorage.setItem('pllSchoolAccess', JSON.stringify({
                    code,
                    schoolName: school.schoolName,
                    role,
                    validatedAt: Date.now()
                }));

                window.location.href = role === 'coach' ? 'coaches.html' : 'athlete-view.html';

            } catch(e) {
                err.textContent = 'Connection error. Please try again.';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-unlock"></i> Unlock';
            }
        }
    </script>
</body>
</html>
