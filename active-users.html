<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerLift Live | Active Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .btn-back {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(30,41,59,0.8); border: 1px solid rgba(96,165,250,0.3);
            color: rgba(255,255,255,0.8); padding: 8px 18px; border-radius: 8px;
            text-decoration: none; font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s; margin-bottom: 24px; display: inline-block;
        }
        .btn-back:hover { border-color: #60a5fa; color: white; }
        h1 {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, #10b981, #60a5fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .subtitle { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 28px; }
        .user-row {
            background: rgba(15,23,42,0.6);
            border: 1px solid rgba(96,165,250,0.1);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.88rem;
        }
        .user-row:hover { border-color: rgba(96,165,250,0.3); }
        .ip { color: white; font-weight: 700; font-family: monospace; font-size: 1rem; }
        .last-seen { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
        .req-count {
            background: rgba(16,185,129,0.15); color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 20px; padding: 2px 12px; font-size: 0.78rem; font-weight: 700;
        }
        .last-path { color: rgba(255,255,255,0.35); font-size: 0.78rem; font-family: monospace; margin-top: 3px; }
        .section-title {
            color: rgba(255,255,255,0.5); font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px;
            margin: 0 0 12px;
        }
        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px; padding: 16px; color: #f87171;
            font-size: 0.9rem; text-align: center; margin-top: 20px;
        }
        .refresh-info { color: rgba(255,255,255,0.25); font-size: 0.75rem; text-align: right; margin-top: 20px; }
        .empty-msg { color: rgba(255,255,255,0.3); font-size: 0.85rem; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <a href="stats.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Stats</a>

        <h1><i class="fas fa-users me-2"></i>Active Users</h1>
        <p class="subtitle">Unique IPs active in the last 5 minutes — auto-refreshes every 15 seconds</p>

        <div class="section-title"><i class="fas fa-circle me-1" style="color:#10b981;"></i> Live Sessions</div>
        <div id="userList"><div class="empty-msg">Loading...</div></div>

        <div id="errorMsg"></div>
        <div class="refresh-info" id="refreshInfo"></div>
    </div>

    <script>
        const CACHE_BASE = 'https://pllv4.streamwaveprod.com/cache/';

        async function load() {
            try {
                const res = await fetch(CACHE_BASE + 'active_users.json?_=' + Date.now());
                if (!res.ok) throw new Error('not found');
                const users = await res.json();

                const list = document.getElementById('userList');
                if (!users.length) {
                    list.innerHTML = '<div class="empty-msg">No active users in the last 5 minutes.</div>';
                    return;
                }

                list.innerHTML = users.map(u => {
                    const ageSec = Math.floor(Date.now() / 1000) - u.lastSeen;
                    const ageText = ageSec < 60 ? ageSec + 's ago' : Math.floor(ageSec / 60) + 'm ago';
                    return `<div class="user-row">
                        <div>
                            <div class="ip"><i class="fas fa-circle" style="color:#10b981;font-size:0.5rem;vertical-align:middle;margin-right:6px;"></i>${u.ip}</div>
                            <div class="last-path">${u.lastPath || ''}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="req-count">${u.requests} req</div>
                            <div class="last-seen">${ageText}</div>
                        </div>
                    </div>`;
                }).join('');

                document.getElementById('errorMsg').innerHTML = '';
                document.getElementById('refreshInfo').textContent = 'Updated: ' + new Date().toLocaleTimeString() + ' · auto-refresh in 15s';
            } catch (e) {
                document.getElementById('errorMsg').innerHTML =
                    '<div class="error-msg"><i class="fas fa-exclamation-triangle me-2"></i>Could not load active_users.json — make sure gen_stats.sh is updated on the server.</div>';
            }
        }

        load();
        setInterval(load, 15000);
    </script>
</body>
</html>
