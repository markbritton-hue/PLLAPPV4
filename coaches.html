<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://pllv4.streamwaveprod.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-ancestors 'none';">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerLift Live | Coaches View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .platform-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .platform-name {
            color: #60a5fa;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .athlete-card {
            background: rgba(16, 185, 129, 0.18);
            border: 1px solid rgba(16, 185, 129, 0.7);
            border-left: 4px solid #60a5fa;
            border-radius: 8px;
            margin-bottom: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            overflow: hidden;
            padding: 6px 10px;
        }

        .athlete-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.6);
        }

        .athlete-card.lifting {
            background: rgba(239, 68, 68, 0.18);
            border-color: rgba(239, 68, 68, 0.7);
            border-left-color: #ef4444;
        }

        .athlete-card.on-deck {
            background: rgba(234, 179, 8, 0.18);
            border-color: rgba(234, 179, 8, 0.7);
            border-left-color: #eab308;
        }

        .athlete-card.in-the-hole {
            background: rgba(16, 185, 129, 0.18);
            border-color: rgba(16, 185, 129, 0.7);
            border-left-color: #10b981;
        }

        .athlete-card.queued {
            background: rgba(15, 23, 42, 0.75);
            border-color: rgba(255,255,255,0.07);
            border-left-color: #374151;
        }

        .athlete-card.done {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(255,255,255,0.12);
            border-left-color: #6b7280;
        }

        .athlete-summary {
            display: flex;
            flex-direction: column;
            gap: 2px;
            cursor: pointer;
            user-select: none;
        }

        .designation-badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .designation-badge.varsity {
            background: #8b5cf6;
            color: white;
        }

        .designation-badge.jv {
            background: #10b981;
            color: white;
        }

        .expand-arrow {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .expand-hint {
            text-align: center;
            color: rgba(255,255,255,0.25);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 4px;
            pointer-events: none;
        }

        .expand-hint.hidden {
            display: none;
        }

        .total-box {
            background: rgba(139, 92, 246, 0.07);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            text-align: center;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .total-label {
            font-size: 0.7rem;
            opacity: 0.7;
            font-weight: 600;
        }

        .total-value {
            font-size: 0.95rem;
            font-weight: 800;
        }

        .attempt-weight {
            font-size: 1rem;
            font-weight: 600;
            color: #60a5fa;
            margin-left: 12px;
        }

        .status-badge {
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: white;
        }

        .status-badge.lifting {
            background: #ef4444;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .status-badge.on-deck {
            background: #eab308;
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
        }

        .status-badge.in-the-hole {
            background: #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .status-badge.queued {
            background: #374151;
            box-shadow: none;
        }

        .status-badge.done {
            background: #6b7280;
        }

        .btn-back {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(96, 165, 250, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(30, 41, 59, 1);
            transform: translateY(-2px);
            color: white;
        }

        .athlete-details {
            display: none;
            padding: 14px 16px 16px;
            border-top: 1px solid rgba(255,255,255,0.07);
            background: rgba(0, 0, 0, 0.25);
        }

        .athlete-details.open {
            display: block;
        }

        .attempt-cell {
            text-align: center;
            padding: 3px 2px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .auto-refresh {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            padding: 12px 20px;
            border-radius: 10px;
            color: #10b981;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div style="display: flex; gap: 8px; margin-bottom: 15px; align-items: center; flex-wrap: nowrap; overflow-x: auto;">
        <a href="index.html" class="btn" style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(96, 165, 250, 0.2); color: white; text-decoration: none; white-space: nowrap; flex-shrink: 0;">
            <i class="fas fa-home me-2"></i>Home
        </a>
        <button id="refreshToggle" onclick="toggleAutoRefresh()" class="btn" style="background: rgba(96, 165, 250, 0.8); border: none; color: white; cursor: pointer; white-space: nowrap; flex-shrink: 0;">
            <i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF
        </button>
        <button id="voiceBtn" onclick="tapToEnableVoice()" style="display:flex; background:rgba(236,72,153,0.15); border:1px solid rgba(236,72,153,0.4); border-radius:8px; color:white; cursor:pointer; padding:8px 12px; flex-shrink:0;" title="Enable voice announcements">
            <i id="voiceBtnIcon" class="fas fa-volume-xmark" style="color:#ec4899; font-size:1.1rem;"></i>
        </button>
    </div>

    <div id="announcementToast" style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(236,72,153,0.95); color:white; padding:12px 22px; border-radius:30px; font-size:0.95rem; font-weight:700; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:9999; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; white-space:nowrap; max-width:90vw; text-align:center;"></div>

    <div style="text-align: center; margin-bottom: 16px;">
        <h1 style="font-size: 1.3rem; font-weight: 900; color: white; margin: 0;">
            <i class="fas fa-clipboard-user" style="color: #ec4899; margin-right: 8px;"></i>Coaches View
        </h1>
        <div id="coachesSchoolName" style="color: rgba(255,255,255,0.6); font-size: 0.95rem; font-weight: 600; margin-top: 4px;"></div>
    </div>

    <div id="displayContainer"></div>


    <script src="state-records-data.js"></script>
    <script>
        const h = s => (s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'));
        let autoRefreshInterval = null;
        let schoolName = '';
        let coachGender = 'M';
        let coachStateRecords = {};
        let coachJvStateRecords = {};
        let coachIsStateMeet = false;
        let announcedStatuses = {}; // { athleteNameLower: lastStatus }
        let speechPrimed = false;
        let sessionPrimed = false; // true only after user taps voice btn this session (iOS requires gesture)
        let pendingAnnouncements = []; // saved items to replay on tap

        function setVoiceActive(state) {
            // state: 'on' | 'off' | 'pending' (primed preference but needs tap to unlock audio)
            const icon = document.getElementById('voiceBtnIcon');
            const btn = document.getElementById('voiceBtn');
            if (state === 'on') {
                if (icon) { icon.className = 'fas fa-volume-high'; icon.style.color = '#10b981'; }
                if (btn) { btn.style.background = 'rgba(16,185,129,0.15)'; btn.style.borderColor = 'rgba(16,185,129,0.4)'; btn.title = 'Voice announcements active'; }
            } else if (state === 'pending') {
                if (icon) { icon.className = 'fas fa-volume-low'; icon.style.color = '#f59e0b'; }
                if (btn) { btn.style.background = 'rgba(245,158,11,0.15)'; btn.style.borderColor = 'rgba(245,158,11,0.4)'; btn.title = 'Tap to resume voice announcements'; }
            } else {
                if (icon) { icon.className = 'fas fa-volume-xmark'; icon.style.color = '#ec4899'; }
                if (btn) { btn.style.background = 'rgba(236,72,153,0.15)'; btn.style.borderColor = 'rgba(236,72,153,0.4)'; btn.title = 'Enable voice announcements'; }
            }
        }

        function hidePrimeBanner() { setVoiceActive('on'); }

        function tapToEnableVoice() {
            if (speechPrimed && sessionPrimed) {
                // Toggle off
                speechPrimed = false;
                sessionPrimed = false;
                localStorage.setItem('coachesVoicePrimed', 'off');
                setVoiceActive('off');
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                return;
            }
            // Toggle on (or re-activate after page reload)
            speechPrimed = true;
            sessionPrimed = true;
            localStorage.setItem('coachesVoicePrimed', 'on');
            setVoiceActive('on');
            if (!window.speechSynthesis) return;
            if (window.speechSynthesis.paused) window.speechSynthesis.resume();
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();

            // iOS requires a non-empty audible utterance spoken directly inside
            // the user-gesture handler to unlock the audio engine.
            const items = pendingAnnouncements;
            pendingAnnouncements = [];
            const firstText = items.length > 0 ? items[0].text : 'Voice announcements enabled';
            const primer = new SpeechSynthesisUtterance(firstText);
            primer.rate = 0.9; primer.pitch = 1.0; primer.volume = 1.0;
            window.speechSynthesis.speak(primer);
            if (items.length > 0) showAnnouncementToast(firstText);

            // Queue any additional pending items after the primer
            items.slice(1).forEach(function(item) {
                const u = new SpeechSynthesisUtterance(item.text);
                u.rate = 0.9; u.pitch = 1.0; u.volume = 1.0;
                window.speechSynthesis.speak(u);
            });
        }

        // iOS suspends speech synthesis after ~30s of silence — keep it alive
        setInterval(function() {
            if (speechPrimed && window.speechSynthesis && !window.speechSynthesis.speaking) {
                window.speechSynthesis.resume();
            }
        }, 10000);

        function speakQueue(items) {
            // items = [{ text, key, prevStatus }]
            if (!window.speechSynthesis || items.length === 0) return;
            // Always save as pending so tap-to-enable can replay them
            pendingAnnouncements = items;
            if (!speechPrimed) return; // wait for user tap
            if (!sessionPrimed) return; // wait for user tap to unlock audio this session
            pendingAnnouncements = [];
            if (window.speechSynthesis.paused) window.speechSynthesis.resume();
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            showAnnouncementToast(items[0].text);
            items.forEach(function(item, i) {
                const u = new SpeechSynthesisUtterance(item.text);
                u.rate = 0.9; u.pitch = 1.0; u.volume = 1.0;
                if (i === 0) u.onstart = function() { if (speechPrimed) setVoiceActive('on'); };
                u.onerror = function(e) {
                    console.log('[Speech] blocked:', e.error, '— will retry');
                    announcedStatuses[item.key] = item.prevStatus;
                };
                window.speechSynthesis.speak(u);
            });
        }

        function showAnnouncementToast(text) {
            let toast = document.getElementById('announcementToast');
            if (!toast) return;
            toast.textContent = '🔊 ' + text;
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
            }, 4000);
        }

        function getLastLiftResult(athlete) {
            // Check attempts in reverse lifting order: dl3 → dl2 → dl1 → bp3 → ... → sq1
            const attempts = [
                { key: 'dead3', liftKey: 'dl' }, { key: 'dead2', liftKey: 'dl' }, { key: 'dead1', liftKey: 'dl' },
                { key: 'bench3', liftKey: 'bp' }, { key: 'bench2', liftKey: 'bp' }, { key: 'bench1', liftKey: 'bp' },
                { key: 'squat3', liftKey: 'sq' }, { key: 'squat2', liftKey: 'sq' }, { key: 'squat1', liftKey: 'sq' },
            ];
            for (const { key, liftKey } of attempts) {
                const val = athlete[key];
                if (!val || !val.trim()) continue;
                const lower = val.toLowerCase();
                const failed = lower.includes('x');
                const good = lower.includes('g');
                if (!failed && !good) continue;
                if (good) {
                    const num = parseFloat(val.replace(/[xgXG]/gi, '').trim());
                    const _coachRec = athlete.designation === 'JV' ? coachJvStateRecords : coachStateRecords;
                    const isRecord = coachIsStateMeet && isStateRecordAttempt(num, liftKey, athlete.weightClass, _coachRec);
                    return isRecord ? 'record' : 'good';
                }
                return 'failed';
            }
            return null;
        }

        function announceIfNeeded(athletes, config) {

            const toSpeak = [];

            for (const athlete of athletes) {
                const key = (athlete.name || '').toLowerCase().trim();
                if (!key) continue;

                let currentStatus;
                if (!athlete.hasPending) {
                    currentStatus = 'done';
                } else if (athlete.platformPosition === 1) {
                    currentStatus = 'lifting';
                } else if (athlete.platformPosition === 2) {
                    currentStatus = 'on-deck';
                } else {
                    currentStatus = `position-${athlete.platformPosition}`;
                }

                const lastStatus = announcedStatuses[key];
                if (currentStatus === lastStatus) continue;

                const name = athlete.name;
                const platform = athlete.platformName || '';
                const onPlatform = platform ? ` on ${platform}` : '';
                let text = null;

                if (currentStatus === 'lifting') {
                    text = `${name} is now lifting${onPlatform}!`;
                } else if (currentStatus === 'on-deck') {
                    text = `${name} is on deck${onPlatform}! Get ready!`;
                } else if (currentStatus === 'done' && lastStatus !== undefined && lastStatus !== 'done') {
                    const result = getLastLiftResult(athlete);
                    if (result === 'record') text = `${name} finished${onPlatform} with a new state record!`;
                    else if (result === 'good') text = `${name} is done${onPlatform}. Good lift!`;
                    else if (result === 'failed') text = `${name} is done${onPlatform}. Failed attempt.`;
                    else text = `${name} has finished${onPlatform}!`;
                }

                announcedStatuses[key] = currentStatus;
                if (text) toSpeak.push({ text, key, prevStatus: lastStatus });
            }

            if (toSpeak.length > 0) speakQueue(toSpeak);
        }

        function toggleAutoRefresh() {
            const btn = document.getElementById('refreshToggle');
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF';
                btn.style.background = 'rgba(96, 165, 250, 0.8)';
                localStorage.setItem('coachesAutoRefresh', 'off');
            } else {
                const cfg = JSON.parse(localStorage.getItem('trplConfig') || '{}');
                const intervalMs = (cfg.autoRefreshSeconds || 20) * 1000;
                autoRefreshInterval = setInterval(function() {
                    loadDisplay(true);
                }, intervalMs);
                btn.innerHTML = `<i class="fas fa-sync-alt fa-spin me-2"></i>Auto-Refresh: ON`;
                btn.style.background = 'rgba(16, 185, 129, 0.8)';
                localStorage.setItem('coachesAutoRefresh', 'on');
                announcedStatuses = {}; // Reset so current statuses re-announce
                // Prime speech synthesis inside user gesture so timer-based announcements work
                if (window.speechSynthesis) {
                    const primer = new SpeechSynthesisUtterance('');
                    primer.volume = 0;
                    primer.onstart = function() { if (speechPrimed) setVoiceActive(true); };
                    window.speechSynthesis.speak(primer);
                }
                loadDisplay();
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            // On page refresh restore voice preference but require one tap to re-unlock audio.
            // On fresh navigation always start off.
            const navType = (performance.getEntriesByType('navigation')[0] || {}).type;
            const isReload = navType === 'reload';
            const savedVoice = localStorage.getItem('coachesVoicePrimed');
            if (isReload && savedVoice === 'on') {
                speechPrimed = true;
                sessionPrimed = false; // needs tap to re-unlock audio this session
                setVoiceActive('pending');
            } else {
                speechPrimed = false;
                sessionPrimed = false;
                localStorage.setItem('coachesVoicePrimed', 'off');
                setVoiceActive('off');
            }
            // Restore auto-refresh state (toggleAutoRefresh calls loadDisplay internally)
            if (localStorage.getItem('coachesAutoRefresh') === 'on') {
                toggleAutoRefresh();
            } else {
                loadDisplay();
            }
        });

        // Re-announce current status when user returns to this tab
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                announcedStatuses = {};
            }
        });

        async function loadDisplay(preserveScroll = false) {
            const scrollPosition = preserveScroll ? window.pageYOffset || document.documentElement.scrollTop : 0;

            const configStr = localStorage.getItem('trplConfig');
            if (!configStr) {
                document.getElementById('displayContainer').innerHTML = '<p style="text-align: center; font-size: 2rem;">No configuration found. Please go to Setup.</p>';
                return;
            }

            try {
                const config = JSON.parse(configStr);
                schoolName = config.schoolName || '';
                coachIsStateMeet = !!config.isStateMeet;
                const schoolEl = document.getElementById('coachesSchoolName');
                if (schoolEl && schoolName) schoolEl.textContent = schoolName;

                // Init state records and detect gender from sheet title
                initStateRecordsStorage();
                coachStateRecords = JSON.parse(localStorage.getItem('trplStateRecords2_M') || '{}');
                coachJvStateRecords = JSON.parse(localStorage.getItem('trplStateRecords2_JV_M') || '{}');
                fetch(`https://pllv4.streamwaveprod.com/cache/meta_${config.spreadsheetId}.html`)
                    .then(r => r.text()).then(html => {
                        const m = html.match(/<title>([^<]+)<\/title>/);
                        if (m) {
                            const t = m[1].toLowerCase();
                            coachGender = (t.includes('women') || t.includes('girl') || t.includes('female')) ? 'W' : 'M';
                        }
                        coachStateRecords    = JSON.parse(localStorage.getItem(`trplStateRecords2_${coachGender}`) || '{}');
                        coachJvStateRecords  = JSON.parse(localStorage.getItem(`trplStateRecords2_JV_${coachGender}`) || '{}');
                    }).catch(() => {});

                const platforms = config.sheets.filter(s => s.name.toLowerCase().startsWith('platform'));

                if (platforms.length === 0) {
                    document.getElementById('displayContainer').innerHTML = '<p style="text-align: center; font-size: 2rem;">No platform sheets found.</p>';
                    return;
                }

                await loadPlatformsData(config, platforms);


                if (preserveScroll && scrollPosition > 0) {
                    setTimeout(() => {
                        window.scrollTo({ top: scrollPosition, behavior: 'instant' });
                    }, 100);
                }

            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadPlatformsData(config, platforms) {
            const container = document.getElementById('displayContainer');

            // Save which athletes have their details expanded (keyed by athlete name)
            const expandedNames = new Set();
            container.querySelectorAll('.athlete-details.open').forEach(el => {
                const nameEl = el.previousElementSibling?.querySelector('.athlete-name');
                if (nameEl) expandedNames.add(nameEl.textContent.trim().split('\n')[0].trim());
            });

            container.innerHTML = '';

            // Load all platforms in parallel
            const platformResults = await Promise.all(platforms.map(async platform => {
                try {
                    const { athletes, cacheStatus, cacheAge } = await loadPlatformData(config.spreadsheetId, platform.gid);
                    const currentColumn = getCurrentAttemptColumn(athletes);
                    const pendingFilter = currentColumn
                        ? (a) => hasPendingInColumn(a, currentColumn)
                        : (a) => hasAnyPendingAttempt(a);

                    const allSorted = sortAthletesByLiftingOrder(athletes).filter(pendingFilter);
                    const platformPositionMap = {};
                    allSorted.forEach((a, idx) => { platformPositionMap[a.sheetOrder] = idx + 1; });

                    const schoolAthletes = athletes.filter(a =>
                        a.school && a.school.toLowerCase().includes(schoolName.toLowerCase())
                    );
                    schoolAthletes.forEach(a => {
                        a.platformName = platform.name;
                        a.platformGid = platform.gid;
                        a.platformPosition = platformPositionMap[a.sheetOrder] || 0;
                        a.hasPending = pendingFilter(a);
                        a.currentColumn = currentColumn;
                    });
                    return { schoolAthletes, cacheStatus, cacheAge };
                } catch (error) {
                    console.error(`Error loading ${platform.name}:`, error);
                    return { schoolAthletes: [], cacheStatus: null, cacheAge: null };
                }
            }));

            // Update cache status badge from first successful result
            const firstCache = platformResults.find(r => r.cacheStatus);
            if (firstCache) updateCacheBadge(firstCache.cacheStatus, firstCache.cacheAge);
            checkHeartbeat();

            // Combine all school athletes and sort by platform position across all platforms
            const allSchoolAthletes = platformResults.flatMap(r => r.schoolAthletes);
            allSchoolAthletes.sort((a, b) => {
                if (!a.hasPending && b.hasPending) return 1;
                if (a.hasPending && !b.hasPending) return -1;
                return (a.platformPosition || 999) - (b.platformPosition || 999);
            });

            announceIfNeeded(allSchoolAthletes, config);

            if (allSchoolAthletes.length > 0) {
                renderAllAthletes(allSchoolAthletes);

                // Restore expanded state — merge in-memory set with localStorage (survives page refresh)
                try {
                    const stored = JSON.parse(localStorage.getItem('coachesExpandedAthletes') || '[]');
                    stored.forEach(n => expandedNames.add(n));
                } catch(e) {}
                if (expandedNames.size > 0) {
                    container.querySelectorAll('.athlete-details').forEach(el => {
                        const nameEl = el.previousElementSibling?.querySelector('.athlete-name');
                        const name = nameEl?.textContent.trim().split('\n')[0].trim();
                        if (name && expandedNames.has(name)) {
                            el.classList.add('open');
                            const arrow = document.getElementById('arrow-' + el.id);
                            if (arrow) arrow.style.transform = 'rotate(180deg)';
                        }
                    });
                }
            }
        }

        async function loadPlatformData(spreadsheetId, gid) {
            const csvUrl = `https://pllv4.streamwaveprod.com/cache/sheet_${spreadsheetId}_${gid}.csv`;

            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error(`Failed to fetch platform data: ${response.status}`);

            const cacheStatus = response.headers.get('X-Cache') || 'MISS';
            const cacheAge    = response.headers.get('X-Cache-Age');

            const csvText = await response.text();
            const csvData = parseCSV(csvText);
            return { athletes: parseAthletes(csvData), cacheStatus, cacheAge };
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];

            for (let line of lines) {
                if (!line.trim()) continue;

                const values = [];
                let current = '';
                let inQuotes = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim().replace(/^"|"$/g, ''));
                result.push(values);
            }

            return result;
        }

        function parseAthletes(csvData) {
            const athletes = [];
            let headerRow = -1;
            let nameCol = -1, schoolCol = -1, weightClassCol = -1, bodyWeightCol = -1, totalCol = -1;
            let squat1Col = -1, squat2Col = -1, squat3Col = -1;
            let bench1Col = -1, bench2Col = -1, bench3Col = -1;
            let dead1Col = -1, dead2Col = -1, dead3Col = -1;

            for (let i = 0; i < Math.min(15, csvData.length); i++) {
                const row = csvData[i];
                for (let j = 0; j < row.length; j++) {
                    const cell = row[j].toLowerCase().trim();
                    if ((cell === 'name' || cell === 'lifter') && nameCol === -1) nameCol = j;
                    if (cell === 'school' && schoolCol === -1) schoolCol = j;
                    if ((cell === 'weight class' || cell === 'wt class' || cell === 'wt. class' || cell === 'class' || cell === 'wc' || (cell.includes('wt') && cell.includes('class'))) && weightClassCol === -1) weightClassCol = j;
                    if ((cell === 'body weight' || cell === 'bw' || cell === 'bodyweight') && bodyWeightCol === -1) bodyWeightCol = j;
                    if (cell === 'total' && totalCol === -1) totalCol = j;
                    if ((cell === 'squat 1' || cell === 'sq1' || cell === 'squat1' || cell === 'f') && squat1Col === -1) squat1Col = j;
                    if ((cell === 'squat 2' || cell === 'sq2' || cell === 'squat2') && squat2Col === -1) squat2Col = j;
                    if ((cell === 'squat 3' || cell === 'sq3' || cell === 'squat3') && squat3Col === -1) squat3Col = j;
                    if ((cell === 'bench 1' || cell === 'bp1' || cell === 'bench1') && bench1Col === -1) bench1Col = j;
                    if ((cell === 'bench 2' || cell === 'bp2' || cell === 'bench2') && bench2Col === -1) bench2Col = j;
                    if ((cell === 'bench 3' || cell === 'bp3' || cell === 'bench3') && bench3Col === -1) bench3Col = j;
                    if ((cell === 'deadlift 1' || cell === 'dead 1' || cell === 'dl1' || cell === 'deal lift 1') && dead1Col === -1) dead1Col = j;
                    if ((cell === 'deadlift 2' || cell === 'dead 2' || cell === 'dl2' || cell === 'dead lift 2') && dead2Col === -1) dead2Col = j;
                    if ((cell === 'deadlift 3' || cell === 'dead 3' || cell === 'dl3' || cell === 'dead lift 3') && dead3Col === -1) dead3Col = j;
                }

                if (nameCol !== -1 && schoolCol !== -1) {
                    headerRow = i;
                    break;
                }
            }

            if (headerRow === -1) return athletes;

            // Check the row(s) after the header for attempt sub-headers
            function scanSubHeaderRow(row) {
                for (let j = 0; j < row.length; j++) {
                    const cell = row[j].toLowerCase().trim();
                    if ((cell === 'squat 1' || cell === 'sq1' || cell === 'sq 1' || cell === 'squat1') && squat1Col === -1) squat1Col = j;
                    if ((cell === 'squat 2' || cell === 'sq2' || cell === 'sq 2' || cell === 'squat2') && squat2Col === -1) {
                        squat2Col = j;
                        if (squat1Col === -1 && j > 0) squat1Col = j - 1;
                        if (squat3Col === -1 && j < row.length - 1) squat3Col = j + 1;
                    }
                    if ((cell === 'squat 3' || cell === 'sq3' || cell === 'sq 3' || cell === 'squat3') && squat3Col === -1) squat3Col = j;
                    if ((cell === 'bench 1' || cell === 'bp1' || cell === 'bp 1' || cell === 'bench1') && bench1Col === -1) bench1Col = j;
                    if ((cell === 'bench 2' || cell === 'bp2' || cell === 'bp 2' || cell === 'bench2') && bench2Col === -1) {
                        bench2Col = j;
                        if (bench1Col === -1 && j > 0) bench1Col = j - 1;
                        if (bench3Col === -1 && j < row.length - 1) bench3Col = j + 1;
                    }
                    if ((cell === 'bench 3' || cell === 'bp3' || cell === 'bp 3' || cell === 'bench3') && bench3Col === -1) bench3Col = j;
                    if ((cell === 'dead lift 1' || cell === 'deal lift 1' || cell === 'dl1' || cell === 'dl 1' || cell === 'deadlift 1' || cell === 'dead 1') && dead1Col === -1) dead1Col = j;
                    if ((cell === 'dead lift 2' || cell === 'dl2' || cell === 'dl 2' || cell === 'deadlift 2' || cell === 'dead 2') && dead2Col === -1) {
                        dead2Col = j;
                        if (dead1Col === -1 && j > 0) dead1Col = j - 1;
                        if (dead3Col === -1 && j < row.length - 1) dead3Col = j + 1;
                    }
                    if ((cell === 'dead lift 3' || cell === 'dl3' || cell === 'dl 3' || cell === 'deadlift 3' || cell === 'dead 3') && dead3Col === -1) dead3Col = j;
                }
            }
            if (csvData[headerRow + 1]) {
                scanSubHeaderRow(csvData[headerRow + 1]);
                headerRow = headerRow + 1;
            }
            if (squat1Col === -1 && bench1Col === -1 && dead1Col === -1 && csvData[headerRow + 1]) {
                scanSubHeaderRow(csvData[headerRow + 1]);
                headerRow = headerRow + 1;
            }

            // Additional fallback: if we have columns for attempt 1 and 2, infer attempt 3
            if (squat1Col !== -1 && squat2Col !== -1 && squat3Col === -1) {
                squat3Col = squat2Col + 1;
            }
            if (bench1Col !== -1 && bench2Col !== -1 && bench3Col === -1) {
                bench3Col = bench2Col + 1;
            }
            if (dead1Col !== -1 && dead2Col !== -1 && dead3Col === -1) {
                dead3Col = dead2Col + 1;
            }

            for (let i = headerRow + 1; i < csvData.length; i++) {
                const row = csvData[i];
                if (row.length <= nameCol) continue;

                const name = row[nameCol]?.trim();
                if (!name) continue;

                const rawWc = weightClassCol !== -1 ? row[weightClassCol]?.trim() : '';
                const designation = rawWc?.toUpperCase().includes('JV') ? 'JV' : 'V';
                const weightClass = rawWc?.match(/(\d+)/)?.[1] || rawWc;
                athletes.push({
                    name: name,
                    school: schoolCol !== -1 ? row[schoolCol]?.trim() : '',
                    designation,
                    weightClass,
                    bodyWeight: bodyWeightCol !== -1 ? parseFloat(row[bodyWeightCol]) || 0 : 0,
                    total: totalCol !== -1 ? parseFloat(row[totalCol]) || 0 : 0,
                    squat1: squat1Col !== -1 ? row[squat1Col]?.trim() : '',
                    squat2: squat2Col !== -1 ? row[squat2Col]?.trim() : '',
                    squat3: squat3Col !== -1 ? row[squat3Col]?.trim() : '',
                    bench1: bench1Col !== -1 ? row[bench1Col]?.trim() : '',
                    bench2: bench2Col !== -1 ? row[bench2Col]?.trim() : '',
                    bench3: bench3Col !== -1 ? row[bench3Col]?.trim() : '',
                    dead1: dead1Col !== -1 ? row[dead1Col]?.trim() : '',
                    dead2: dead2Col !== -1 ? row[dead2Col]?.trim() : '',
                    dead3: dead3Col !== -1 ? row[dead3Col]?.trim() : '',
                    sheetOrder: i - headerRow - 1
                });
            }

            return athletes;
        }

        function sortAthletesByLiftingOrder(athletes) {
            const currentColumn = getCurrentAttemptColumn(athletes);

            return [...athletes].sort((a, b) => {
                const aPending = hasPendingInColumn(a, currentColumn);
                const bPending = hasPendingInColumn(b, currentColumn);

                if (aPending && !bPending) return -1;
                if (!aPending && bPending) return 1;

                // If both have pending attempts in current column, sort by weight
                if (aPending && bPending && currentColumn) {
                    const aWeight = parseFloat(a[currentColumn].replace(/[xgXG]/g, '').trim()) || 0;
                    const bWeight = parseFloat(b[currentColumn].replace(/[xgXG]/g, '').trim()) || 0;
                    if (aWeight !== bWeight) {
                        return aWeight - bWeight; // Lightest first
                    }
                }

                return a.sheetOrder - b.sheetOrder;
            });
        }

        function getCurrentAttemptColumn(athletes) {
            const attemptColumns = [
                'squat1', 'squat2', 'squat3',
                'bench1', 'bench2', 'bench3',
                'dead1', 'dead2', 'dead3'
            ];

            for (const col of attemptColumns) {
                const hasPending = athletes.some(athlete => {
                    const value = athlete[col];
                    if (!value) return false;
                    const lower = value.toLowerCase();
                    return !lower.includes('g') && !lower.includes('x');
                });

                if (hasPending) return col;
            }

            return null;
        }

        function hasPendingInColumn(athlete, column) {
            if (!column) return false;
            const value = athlete[column];
            if (!value) return false;
            const lower = value.toLowerCase();
            return !lower.includes('g') && !lower.includes('x');
        }

        function hasAnyPendingAttempt(athlete) {
            const cols = ['squat1', 'squat2', 'squat3', 'bench1', 'bench2', 'bench3', 'dead1', 'dead2', 'dead3'];
            return cols.some(col => {
                const val = athlete[col];
                if (!val) return false;
                const lower = val.toLowerCase();
                return !lower.includes('g') && !lower.includes('x');
            });
        }

        function renderAttempt(val, liftKey, weightClass, designation) {
            if (!val) return `<div class="attempt-cell" style="background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3);">—</div>`;
            const failed = val.toLowerCase().includes('x');
            const good = val.toLowerCase().includes('g');
            const num = val.replace(/[xgXG]/g, '').trim();
            const bg = failed ? '#ef4444' : good ? 'rgba(16,185,129,0.2)' : '#000';
            const border = failed ? '#dc2626' : good ? '#10b981' : 'rgba(96,165,250,0.2)';
            const color = failed ? 'white' : good ? '#10b981' : 'white';
            const icon = failed ? ' ✗' : good ? ' ✓' : '';
            const _rec = designation === 'JV' ? coachJvStateRecords : coachStateRecords;
            const isRecord = coachIsStateMeet && !failed && liftKey && weightClass && isStateRecordAttempt(parseFloat(num), liftKey, weightClass, _rec);
            const star = isRecord ? `<i class="fas fa-star" style="color:#ef4444; font-size:0.7rem; margin-left:2px;" title="State record attempt"></i>` : '';
            return `<div class="attempt-cell" style="background:${bg}; border:1px solid ${border}; color:${color};">${num}${icon}${star}</div>`;
        }

        function coachAttemptChip(val) {
            if (!val) return '';
            const num = val.replace(/[xgXGfF]/g, '').trim();
            if (!num) return '';
            const lower = val.toLowerCase();
            const good   = lower.includes('g');
            const failed = lower.includes('x');
            const icon   = good ? '✓' : failed ? '✗' : '·';
            const color  = good ? '#10b981' : failed ? '#ef4444' : 'rgba(255,255,255,0.45)';
            const bg     = good ? 'rgba(16,185,129,0.15)' : failed ? 'rgba(239,68,68,0.15)' : 'rgba(255,255,255,0.05)';
            const border = good ? 'rgba(16,185,129,0.45)' : failed ? 'rgba(239,68,68,0.45)' : 'rgba(255,255,255,0.1)';
            return `<span style="display:inline-flex;align-items:center;gap:3px;background:${bg};border:1px solid ${border};border-radius:6px;padding:4px 10px;font-size:0.85rem;font-weight:700;color:${color};white-space:nowrap;">${icon} ${num}</span>`;
        }

        function coachChipStar(val, lk, weightClass, designation) {
            const chip = coachAttemptChip(val);
            if (!chip) return '<span style="color:rgba(255,255,255,0.25);font-size:0.95rem;">—</span>';
            const numW = parseFloat((val || '').replace(/[xgXGfF]/g, ''));
            const rec = designation === 'JV' ? coachJvStateRecords : coachStateRecords;
            const isSR = lk && coachIsStateMeet ? isStateRecordAttempt(numW, lk, weightClass, rec) : false;
            return chip + (isSR ? '<span style="color:#f59e0b;font-size:0.75rem;margin-left:2px;">⭐</span>' : '');
        }

        function renderAllAthletes(athletes) {
            const container = document.getElementById('displayContainer');
            const section = document.createElement('div');
            section.className = 'platform-section';
            let html = '';

            athletes.forEach((athlete, idx) => {
                const overallPosition = athlete.platformPosition || 0;
                let status = '', statusClass = '';

                if (!athlete.hasPending) {
                    status = 'DONE'; statusClass = 'done';
                } else if (overallPosition === 1) {
                    status = 'LIFTING'; statusClass = 'lifting';
                } else if (overallPosition === 2) {
                    status = 'ON DECK'; statusClass = 'on-deck';
                } else if (overallPosition === 3) {
                    status = 'IN THE HOLE'; statusClass = 'in-the-hole';
                } else if (overallPosition > 3) {
                    status = `#${overallPosition}`; statusClass = 'queued';
                }

                let attemptWeight = '';
                let isRecordAttempt = false;
                if (athlete.currentColumn && athlete[athlete.currentColumn]) {
                    const weight = athlete[athlete.currentColumn].replace(/[xgXG]/g, '').trim();
                    if (weight) {
                        attemptWeight = `${weight} lbs`;
                        const colLiftKey = athlete.currentColumn.startsWith('squat') ? 'sq'
                            : athlete.currentColumn.startsWith('bench') ? 'bp' : 'dl';
                        const _cRec = athlete.designation === 'JV' ? coachJvStateRecords : coachStateRecords;
                        isRecordAttempt = !!(coachIsStateMeet && athlete.weightClass && isStateRecordAttempt(parseFloat(weight), colLiftKey, athlete.weightClass, _cRec));
                    }
                }

                const rowClass = statusClass || 'default';
                const detailId = `detail-${idx}`;

                html += `
                    <div class="athlete-card ${rowClass}">
                        <div class="athlete-summary" onclick="toggleDetail('${detailId}')">
                            <div style="display:flex; align-items:center; justify-content:space-between; gap:6px;">
                                <div style="font-size:1.2rem; font-weight:700; color:white; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; display:flex; align-items:center; gap:5px;">
                                    ${isRecordAttempt ? `<i class="fas fa-star" style="color:#f59e0b; font-size:0.85rem; flex-shrink:0;" title="State record attempt"></i>` : ''}
                                    <span class="athlete-name" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${h(athlete.name)}</span>
                                </div>
                                <div style="display:flex; flex-direction:column; align-items:flex-end; gap:2px; flex-shrink:0;">
                                    <div style="display:flex; align-items:center; gap:6px;">
                                        ${status ? `<div class="status-badge ${statusClass}">${status}</div>` : ''}
                                        <i class="fas fa-chevron-down expand-arrow" id="arrow-${detailId}"></i>
                                    </div>
                                    <a href="platform.html?gid=${athlete.platformGid}" onclick="event.stopPropagation();" style="background:#06b6d4; color:white; padding:3px 10px; border-radius:5px; font-size:0.85rem; font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:4px; white-space:nowrap;"><i class="fas fa-layer-group"></i> ${h(athlete.platformName)}</a>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
                                <span class="designation-badge ${athlete.designation === 'JV' ? 'jv' : 'varsity'}">${athlete.designation === 'JV' ? 'JV' : 'Varsity'}</span>
                                ${athlete.weightClass ? `<span style="color:rgba(255,255,255,0.7); font-size:0.78rem; font-weight:700; white-space:nowrap;">${h(athlete.weightClass)} lbs</span>` : ''}
                                ${athlete.bodyWeight ? `<span style="color:rgba(255,255,255,0.5); font-size:0.75rem; font-weight:600; white-space:nowrap;">(${h(athlete.bodyWeight)} lbs BW)</span>` : ''}
                                ${attemptWeight ? `<span style="color:${isRecordAttempt ? '#f59e0b' : 'white'}; font-size:0.78rem; font-weight:700; white-space:nowrap; margin-left:auto;">${isRecordAttempt ? '⭐ SR Attempt ' : 'Attempting '}${h(attemptWeight)}</span>` : ''}
                            </div>
                            <div class="expand-hint" id="hint-${detailId}"><i class="fas fa-chevron-down"></i> <i class="fas fa-chevron-down"></i> tap to expand <i class="fas fa-chevron-down"></i> <i class="fas fa-chevron-down"></i></div>
                        </div>
                        <div class="athlete-details" id="${detailId}">
                            <div style="margin-top:2px;padding:10px 12px;border-radius:8px;background:rgba(15,23,42,0.7);border:1px solid rgba(96,165,250,0.15);">
                                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
                                    <span class="designation-badge ${athlete.designation === 'JV' ? 'jv' : 'varsity'}">${athlete.designation === 'JV' ? 'JV' : 'Varsity'}</span>
                                    ${athlete.school ? `<span style="color:white;font-size:0.92rem;font-weight:600;">${h(athlete.school)}</span>` : ''}
                                    ${athlete.weightClass ? `<span style="color:white;font-size:0.92rem;font-weight:600;">${h(athlete.weightClass)} lb class</span>` : ''}
                                    ${athlete.bodyWeight ? `<span style="color:white;font-size:0.92rem;font-weight:600;">BW ${h(athlete.bodyWeight)} lbs</span>` : ''}
                                </div>
                                <div style="display:flex;flex-direction:column;gap:10px;">
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <span style="display:inline-flex;align-items:center;gap:5px;color:#60a5fa;font-size:0.9rem;font-weight:700;width:80px;flex-shrink:0;"><i class="fas fa-person-falling"></i>Squat</span>
                                        <div style="display:flex;gap:5px;align-items:center;flex-wrap:nowrap;">${coachChipStar(athlete.squat1,'sq',athlete.weightClass,athlete.designation)}${coachChipStar(athlete.squat2,'sq',athlete.weightClass,athlete.designation)}${coachChipStar(athlete.squat3,'sq',athlete.weightClass,athlete.designation)}</div>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <span style="display:inline-flex;align-items:center;gap:5px;color:#a78bfa;font-size:0.9rem;font-weight:700;width:80px;flex-shrink:0;"><i class="fas fa-dumbbell"></i>Bench</span>
                                        <div style="display:flex;gap:5px;align-items:center;flex-wrap:nowrap;">${coachChipStar(athlete.bench1,'bp',athlete.weightClass,athlete.designation)}${coachChipStar(athlete.bench2,'bp',athlete.weightClass,athlete.designation)}${coachChipStar(athlete.bench3,'bp',athlete.weightClass,athlete.designation)}</div>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <span style="display:inline-flex;align-items:center;gap:5px;color:#10b981;font-size:0.9rem;font-weight:700;width:80px;flex-shrink:0;"><i class="fas fa-weight-hanging"></i>Deadlift</span>
                                        <div style="display:flex;gap:5px;align-items:center;flex-wrap:nowrap;">${coachChipStar(athlete.dead1,'dl',athlete.weightClass,athlete.designation)}${coachChipStar(athlete.dead2,'dl',athlete.weightClass,athlete.designation)}${coachChipStar(athlete.dead3,'dl',athlete.weightClass,athlete.designation)}</div>
                                    </div>
                                </div>
                                ${athlete.total ? `<div style="margin-top:8px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.25);border-radius:8px;padding:6px 12px;display:inline-flex;align-items:center;gap:8px;">
                                    <span style="font-size:0.65rem;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.8px;">Total</span>
                                    <span style="font-size:1rem;font-weight:800;color:white;">${h(athlete.total)} lbs</span>
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            section.innerHTML = html;
            container.appendChild(section);
        }

        function toggleDetail(id) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
            const open = el.classList.contains('open');
            const arrow = document.getElementById('arrow-' + id);
            if (arrow) arrow.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
            const hint = document.getElementById('hint-' + id);
            if (hint) hint.classList.toggle('hidden', open);
            // Persist expanded names to localStorage
            const container = document.getElementById('displayContainer');
            const expanded = new Set();
            container.querySelectorAll('.athlete-details.open').forEach(d => {
                const nameEl = d.previousElementSibling?.querySelector('.athlete-name');
                if (nameEl) expanded.add(nameEl.textContent.trim().split('\n')[0].trim());
            });
            localStorage.setItem('coachesExpandedAthletes', JSON.stringify([...expanded]));
        }
        function updateCacheBadge(cacheHit, cacheAge) { /* handled by checkHeartbeat */ }

        async function checkHeartbeat() {
            try {
                const r = await fetch('https://pllv4.streamwaveprod.com/cache/heartbeat.json?_=' + Date.now());
                if (!r.ok) return;
                const data = await r.json();
                const ageSecs = Math.floor(Date.now() / 1000) - data.ts;
                const btn = document.getElementById('refreshToggle');
                if (!btn) return;
                if (ageSecs > 30) {
                    const mins = Math.floor(ageSecs / 60);
                    const secs = ageSecs % 60;
                    const ageStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
                    btn.style.background = 'rgba(239,68,68,0.8)';
                    btn.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>Data Stale · ${ageStr}`;
                } else {
                    // Data is fresh — restore normal button appearance if it was showing stale
                    if (btn.innerHTML.includes('Data Stale')) {
                        btn.style.background = 'rgba(96,165,250,0.8)';
                        const isOn = !!window.autoRefreshInterval;
                        btn.innerHTML = isOn
                            ? '<i class="fas fa-sync-alt fa-spin me-2"></i>Auto-Refresh: ON'
                            : '<i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF';
                    }
                }
            } catch(e) { /* network error — ignore */ }
        }
    </script>
