<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerLift Live | Platform View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px 0;
            color: white;
        }

        /* ── LIFTING card ─────────────────────────────── */
        .card-lifting {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.65);
            border-left: 6px solid #ef4444;
            border-radius: 14px;
            padding: 24px 22px;
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.2);
            height: 100%;
        }

        /* ── ON DECK card ─────────────────────────────── */
        .card-on-deck {
            background: rgba(16, 185, 129, 0.08);
            border: 2px solid rgba(16, 185, 129, 0.55);
            border-left: 6px solid #10b981;
            border-radius: 14px;
            padding: 20px 20px;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.12);
            height: 100%;
        }

        /* ── Minimal position row ─────────────────────── */
        .card-position {
            background: rgba(30, 41, 59, 0.55);
            border: 1px solid rgba(255,255,255,0.06);
            border-left: 3px solid #4b5563;
            border-radius: 8px;
            padding: 7px 12px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-pill {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.8px;
            color: white;
            flex-shrink: 0;
        }
        .status-pill.lifting  { background: #ef4444; box-shadow: 0 2px 10px rgba(239,68,68,0.4); }
        .status-pill.on-deck  { background: #10b981; box-shadow: 0 2px 10px rgba(16,185,129,0.35); }

        .designation-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 700;
        }
        .designation-badge.varsity { background: #8b5cf6; color: white; }
        .designation-badge.jv      { background: #10b981; color: white; }

        .btn-nav {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
            transition: all 0.2s;
            white-space: nowrap;
            cursor: pointer;
        }
        .btn-nav:hover { background: rgba(30,41,59,1); transform: translateY(-2px); color: white; }

        .form-select {
            background: rgba(15, 23, 42, 0.6);
            color: white;
            border: 2px solid rgba(96, 165, 250, 0.3);
            padding: 8px;
            font-size: 1rem;
            border-radius: 8px;
        }
        .form-select:focus {
            background: rgba(15, 23, 42, 0.85);
            color: white;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
            outline: none;
        }
        .form-select option { background: #1e293b; color: white; }

        .divider-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0 8px;
        }
        .divider-label span {
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .divider-label::before,
        .divider-label::after {
            content: '';
            flex: 1;
            border-top: 1px solid white;
        }

        /* ── Just-finished card ───────────────────────────── */
        .card-just-finished {
            background: rgba(167, 139, 250, 0.1);
            border: 2px solid rgba(167, 139, 250, 0.55);
            border-left: 6px solid #a78bfa;
            border-radius: 14px;
            padding: 20px 18px;
            margin-bottom: 12px;
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.15);
        }
        .card-fade-out {
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 0 !important;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* ── Banners ──────────────────────────────────────── */
        @keyframes recordPop {
            0%   { transform: scale(0.3) rotate(-6deg); opacity: 0; }
            50%  { transform: scale(1.08) rotate(2deg); opacity: 1; }
            70%  { transform: scale(0.96) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes recordFadeOut {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }
        .pt-banner {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99998;
            background: rgba(0,0,0,0.55);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            pointer-events: none;
        }
        .pt-banner.show { display: flex; }
        .pt-banner .banner-inner {
            text-align: center;
            animation: recordPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        #ptStateRecordBanner { z-index: 99999; background: rgba(0,0,0,0.65); }
    </style>
</head>
<body>
<div class="container">

    <!-- Nav -->
    <div style="display:flex; gap:6px; margin-bottom:8px; align-items:center; flex-wrap:nowrap; overflow-x:auto;">
        <a href="index.html" class="btn-nav"><i class="fas fa-home me-2"></i>Home</a>
<button id="refreshToggle" onclick="toggleAutoRefresh()" class="btn-nav" style="background:rgba(96,165,250,0.8); border:none;">
            <i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF
        </button>
        <button id="voiceBtn" onclick="tapToEnableVoice()" style="display:none; background:rgba(236,72,153,0.15); border:1px solid rgba(236,72,153,0.4); border-radius:8px; color:white; cursor:pointer; padding:6px 10px; flex-shrink:0;" title="Enable alerts">
            <i id="voiceBtnIcon" class="fas fa-volume-xmark" style="color:#ec4899; font-size:1.1rem;"></i>
        </button>
    </div>

    <!-- Title -->
    <div style="text-align:center; margin-bottom:8px;">
        <h1 style="font-size:1.1rem; font-weight:900; color:white; margin:0;">
            <i class="fas fa-layer-group" style="color:#06b6d4; margin-right:8px;"></i>Platform View
        </h1>
    </div>

    <!-- Platform select -->
    <div style="background:rgba(30,41,59,0.8); border:1px solid rgba(96,165,250,0.2); border-radius:8px; padding:6px 10px; margin-bottom:8px;">
        <select id="platformSelect" class="form-select w-100" onchange="loadPlatform()">
            <option value="">— Select Platform —</option>
        </select>
    </div>

    <!-- Current event banner -->
    <div id="eventBanner" style="display:none; text-align:center; margin-bottom:8px; padding:5px 12px; background:rgba(96,165,250,0.08); border:1px solid rgba(96,165,250,0.25); border-radius:8px;"></div>

    <!-- My Athlete Panel -->
    <div id="myAthletePanel" style="display:none; background:rgba(249,115,22,0.1); border:2px solid rgba(249,115,22,0.45); border-radius:10px; padding:8px 12px; margin-bottom:8px;"></div>
    <div id="myAthleteTip" style="display:none; background:rgba(249,115,22,0.06); border:1px solid rgba(249,115,22,0.2); border-radius:8px; padding:7px 12px; margin-bottom:8px; font-size:0.78rem; color:rgba(255,255,255,0.5);">
        <i class="fas fa-person-running me-1" style="color:rgba(249,115,22,0.7);"></i>
        <span>Tip: Configure <strong style="color:rgba(255,255,255,0.7);">My Athlete</strong> in Setup and they'll always appear at the top of this page for quick access.</span>
    </div>

    <!-- On Platform separator -->
    <div id="onPlatformSeparator" style="display:none; align-items:center; gap:10px; margin:4px 0 8px;">
        <div style="flex:1; border-top:3px solid rgba(255,255,255,0.8);"></div>
        <span style="color:white; font-size:0.8rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; opacity:0.8;">On Platform<span id="onPlatformName" style="font-size:1.1rem; font-weight:800; color:white; opacity:1; text-transform:none; letter-spacing:0;"></span></span>
        <div style="flex:1; border-top:3px solid rgba(255,255,255,0.8);"></div>
    </div>

    <!-- Good Lift Banner -->
    <div id="ptGoodLiftBanner" class="pt-banner">
        <div class="banner-inner">
            <div style="font-size:3.5rem;margin-bottom:8px;filter:drop-shadow(0 0 16px #10b981);">✅</div>
            <div style="font-size:clamp(2.5rem,9vw,5rem);font-weight:900;background:linear-gradient(135deg,#10b981,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;text-transform:uppercase;line-height:1;filter:drop-shadow(0 4px 16px rgba(16,185,129,0.6));">Good Lift!</div>
            <div id="ptGoodLiftSub" style="font-size:clamp(1rem,4vw,1.6rem);font-weight:700;color:white;margin-top:10px;opacity:0.85;"></div>
        </div>
    </div>

    <!-- Failed Attempt Banner -->
    <div id="ptFailedBanner" class="pt-banner">
        <div class="banner-inner">
            <div style="font-size:3.5rem;margin-bottom:8px;filter:drop-shadow(0 0 16px #ef4444);">❌</div>
            <div style="font-size:clamp(2.5rem,9vw,5rem);font-weight:900;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;text-transform:uppercase;line-height:1;filter:drop-shadow(0 4px 16px rgba(239,68,68,0.6));">Failed Attempt!</div>
            <div id="ptFailedSub" style="font-size:clamp(1rem,4vw,1.6rem);font-weight:700;color:white;margin-top:10px;opacity:0.85;"></div>
        </div>
    </div>

    <!-- State Record Banner -->
    <div id="ptStateRecordBanner" class="pt-banner">
        <div class="banner-inner">
            <div style="font-size:4rem;margin-bottom:8px;filter:drop-shadow(0 0 20px #ef4444);">⭐</div>
            <div style="font-size:clamp(2.5rem,10vw,5.5rem);font-weight:900;background:linear-gradient(135deg,#ef4444,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;text-transform:uppercase;line-height:1;filter:drop-shadow(0 4px 20px rgba(239,68,68,0.6));">New State Record!</div>
            <div id="ptStateRecordSub" style="font-size:clamp(1rem,4vw,1.8rem);font-weight:700;color:white;margin-top:12px;opacity:0.9;"></div>
        </div>
    </div>

    <!-- Athlete cards -->
    <div id="athleteContainer"></div>

    <!-- Cache / status -->
    <div id="cacheBadge" style="text-align:center; margin-top:8px; font-size:0.68rem; color:rgba(255,255,255,0.3);"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="state-records-data.js"></script>
<script>
    let autoRefreshInterval = null;
    let currentPlatformGid = null;
    let platformGender = 'M';
    let justFinishedAthlete = null;
    let lastLiftingName = null;
    let lastLiftingColumn = null;
    let lastJustFinishedName = null;
    let justFinishedResult = null;
    let removeCardTimer = null;
    let platformStateRecords = null;
    let platformJvStateRecords = null;
    let myAthletePanelOpen = false;
    let platformSpeechPrimed = false;
    let platformPendingAnnouncement = null;
    let platformLastAnnouncedStatus = null;
    let liftingAudioCtx = null;

    // ── Audio / Voice ──────────────────────────────────────────────────────────
    function initAudioCtx() {
        if (!liftingAudioCtx) {
            try { liftingAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        } else if (liftingAudioCtx.state === 'suspended') {
            liftingAudioCtx.resume();
        }
    }

    function triggerLiftingAlert() {
        if (navigator.vibrate) navigator.vibrate([150,80,150,80,150,80,150,80,400]);
        if (!liftingAudioCtx) return;
        const ctx = liftingAudioCtx;
        const tones = [
            { freq: 880,  start: 0,    dur: 0.28 },
            { freq: 880,  start: 0.38, dur: 0.28 },
            { freq: 1000, start: 0.76, dur: 0.28 },
            { freq: 1000, start: 1.14, dur: 0.28 },
            { freq: 1175, start: 1.52, dur: 0.5  }
        ];
        tones.forEach(({ freq, start, dur }) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.value = freq;
            const t = ctx.currentTime + start;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.5, t + 0.01);
            gain.gain.linearRampToValueAtTime(0, t + dur);
            osc.start(t); osc.stop(t + dur + 0.05);
        });
    }

    function triggerOnDeckAlert() {
        if (navigator.vibrate) navigator.vibrate([120,60,120,60,120,60,250]);
        if (!liftingAudioCtx) return;
        const ctx = liftingAudioCtx;
        const tones = [
            { freq: 660, start: 0,    dur: 0.28 },
            { freq: 660, start: 0.38, dur: 0.28 },
            { freq: 740, start: 0.76, dur: 0.28 },
            { freq: 740, start: 1.14, dur: 0.42 }
        ];
        tones.forEach(({ freq, start, dur }) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.value = freq;
            const t = ctx.currentTime + start;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.35, t + 0.01);
            gain.gain.linearRampToValueAtTime(0, t + dur);
            osc.start(t); osc.stop(t + dur + 0.05);
        });
    }

    function setVoiceActive(active) {
        const icon = document.getElementById('voiceBtnIcon');
        const btn  = document.getElementById('voiceBtn');
        if (active) {
            if (icon) { icon.className = 'fas fa-volume-high'; icon.style.color = '#10b981'; }
            if (btn)  { btn.style.background = 'rgba(16,185,129,0.15)'; btn.style.borderColor = 'rgba(16,185,129,0.4)'; btn.title = 'Alerts active'; }
        } else {
            if (icon) { icon.className = 'fas fa-volume-xmark'; icon.style.color = '#ec4899'; }
            if (btn)  { btn.style.background = 'rgba(236,72,153,0.15)'; btn.style.borderColor = 'rgba(236,72,153,0.4)'; btn.title = 'Enable alerts'; }
        }
    }

    function tapToEnableVoice() {
        initAudioCtx();
        const _cfg = JSON.parse(localStorage.getItem('trplConfig') || '{}');
        if (platformSpeechPrimed) {
            platformSpeechPrimed = false;
            localStorage.setItem('platformVoicePrimed', 'off');
            setVoiceActive(false);
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            return;
        }
        platformSpeechPrimed = true;
        localStorage.setItem('platformVoicePrimed', 'on');
        setVoiceActive(true);
        if (!_cfg.announcementsEnabled || !window.speechSynthesis) return;
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        if (platformPendingAnnouncement) {
            const { text } = platformPendingAnnouncement;
            platformPendingAnnouncement = null;
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 0.9; u.pitch = 1.0; u.volume = 1.0;
            window.speechSynthesis.speak(u);
        } else {
            const primer = new SpeechSynthesisUtterance('');
            primer.volume = 0;
            window.speechSynthesis.speak(primer);
        }
    }

    function speakAnnouncement(text, rollbackStatus) {
        if (!window.speechSynthesis) return;
        platformPendingAnnouncement = { text, rollbackStatus };
        if (!platformSpeechPrimed) return;
        platformPendingAnnouncement = null;
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.9; u.pitch = 1.0; u.volume = 1.0;
        u.onstart = function() { if (platformSpeechPrimed) setVoiceActive(true); };
        u.onerror = function() { platformLastAnnouncedStatus = rollbackStatus !== undefined ? rollbackStatus : null; };
        window.speechSynthesis.speak(u);
    }

    // ── Lift metadata ──────────────────────────────────────────────────────────
    function getLiftInfo(col) {
        if (!col) return null;
        if (col.startsWith('squat')) return { name: 'Squat',     icon: 'fas fa-person-falling', color: '#60a5fa', attempt: col.replace('squat','') };
        if (col.startsWith('bench')) return { name: 'Bench',     icon: 'fas fa-dumbbell',        color: '#a78bfa', attempt: col.replace('bench','') };
        if (col.startsWith('dead'))  return { name: 'Deadlift',  icon: 'fas fa-weight-hanging',  color: '#10b981', attempt: col.replace('dead','')  };
        return null;
    }

    function getPrevAttempts(athlete, currentCol) {
        const map = {
            squat1:[], squat2:['squat1'], squat3:['squat1','squat2'],
            bench1:[], bench2:['bench1'], bench3:['bench1','bench2'],
            dead1:[],  dead2:['dead1'],   dead3:['dead1','dead2']
        };
        return (map[currentCol] || []).map(c => athlete[c] || '');
    }

    function attemptChip(val, large = false) {
        if (!val) return '';
        const num = val.replace(/[xgXGfF]/g, '').trim();
        if (!num) return '';
        const lower = val.toLowerCase();
        const good   = lower.includes('g');
        const failed = lower.includes('x');
        const icon  = good ? '✓' : failed ? '✗' : '·';
        const color  = good ? '#10b981' : failed ? '#ef4444' : 'rgba(255,255,255,0.45)';
        const bg     = good ? 'rgba(16,185,129,0.15)' : failed ? 'rgba(239,68,68,0.15)' : 'rgba(255,255,255,0.05)';
        const border = good ? 'rgba(16,185,129,0.45)' : failed ? 'rgba(239,68,68,0.45)' : 'rgba(255,255,255,0.1)';
        const pad  = large ? '6px 14px' : '3px 9px';
        const size = large ? '1rem'     : '0.82rem';
        return `<span style="display:inline-flex;align-items:center;gap:4px;background:${bg};border:1px solid ${border};border-radius:6px;padding:${pad};font-size:${size};font-weight:700;color:${color};">${icon} ${num}</span>`;
    }

    // ── Card builders ──────────────────────────────────────────────────────────
    function buildLiftingCard(athlete, currentCol, isMySchool) {
        const lift = getLiftInfo(currentCol);
        const rawWeight = athlete[currentCol] ? athlete[currentCol].replace(/[xgXGfF]/g,'').trim() : '—';
        const prevs = getPrevAttempts(athlete, currentCol);
        const liftKey = currentCol.startsWith('squat') ? 'sq' : currentCol.startsWith('bench') ? 'bp' : currentCol.startsWith('dead') ? 'dl' : null;
        const isRecordAttempt = liftKey ? isStateRecordAttempt(parseFloat(rawWeight), liftKey, athlete.weightClass, getAthleteRecords(athlete.designation)) : false;
        const prevHtml = prevs.length
            ? `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;">
                   <span style="font-size:0.68rem;color:rgba(255,255,255,0.35);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-right:2px;">Prev ${lift ? lift.name : ''}</span>
                   ${prevs.map(attemptChip).join('')}
               </div>`
            : '';
        const schoolBg = isMySchool ? 'rgba(249,115,22,0.15)' : 'rgba(255,255,255,0.05)';
        const schoolBorder = isMySchool ? 'rgba(249,115,22,0.4)' : 'rgba(255,255,255,0.1)';

        return `<div class="card-lifting">
            <div style="display:block;width:100%;text-align:center;background:#ef4444;border-radius:8px;padding:6px 0;font-size:0.85rem;font-weight:900;letter-spacing:3px;color:white;margin-bottom:10px;">L I F T I N G</div>

            <div style="display:flex;align-items:flex-start;gap:10px;">
                <div style="flex:1;min-width:0;">
                    <div style="font-size:1.75rem;font-weight:900;color:white;margin-bottom:4px;line-height:1.1;">${athlete.name}</div>
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
                        <span class="designation-badge ${athlete.designation === 'JV' ? 'jv' : 'varsity'}">${athlete.designation === 'JV' ? 'JV' : 'Varsity'}</span>
                        ${athlete.weightClass ? `<span style="color:rgba(255,255,255,0.5);font-size:0.78rem;font-weight:600;">${athlete.weightClass} lb class</span>` : ''}
                        ${athlete.bodyWeight ? `<span style="color:rgba(255,255,255,0.4);font-size:0.78rem;">BW ${athlete.bodyWeight} lbs</span>` : ''}
                    </div>
                    ${athlete.school ? `<span style="background:${schoolBg};border:1px solid ${schoolBorder};padding:2px 10px;border-radius:6px;font-size:0.72rem;font-weight:700;color:rgba(255,255,255,0.75);">${athlete.school}</span>` : ''}
                </div>
                <div style="flex-shrink:0;display:flex;align-items:flex-start;">
                    <img src="${currentCol.startsWith('bench') ? 'bench500-trans.gif' : currentCol.startsWith('dead') ? 'deadlift500-trans.gif' : 'backsquat500-trans.gif'}" alt="lift" style="height:130px;width:auto;object-fit:contain;display:block;">
                </div>
            </div>

            <div style="background:${isRecordAttempt ? 'rgba(245,158,11,0.15)' : 'rgba(239,68,68,0.12)'};border:1px solid ${isRecordAttempt ? 'rgba(245,158,11,0.5)' : 'rgba(239,68,68,0.3)'};border-radius:8px;padding:4px 10px;text-align:center;margin-top:8px;">
                <div style="font-size:0.6rem;font-weight:700;color:white;text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;">Current Attempt${isRecordAttempt ? ' <span style="color:#f59e0b;">⭐ State Record Attempt</span>' : ''}</div>
                <div style="font-size:1.4rem;font-weight:900;color:white;line-height:1;">${rawWeight}<span style="font-size:0.8rem;font-weight:600;color:rgba(255,255,255,0.5);margin-left:4px;">lbs</span></div>
            </div>

            ${prevHtml}
        </div>`;
    }

    // ── State records ──────────────────────────────────────────────────────────
    function loadStateRecords() {
        initStateRecordsStorage();
        const raw = localStorage.getItem(`trplStateRecords2_${platformGender}`);
        try { return raw ? JSON.parse(raw) : (platformGender === 'M' ? BUILTIN_M_RECORDS : BUILTIN_W_RECORDS); }
        catch(e) { return platformGender === 'M' ? BUILTIN_M_RECORDS : BUILTIN_W_RECORDS; }
    }
    function loadJvStateRecords() {
        const raw = localStorage.getItem(`trplStateRecords2_JV_${platformGender}`);
        try { return raw ? JSON.parse(raw) : (platformGender === 'M' ? BUILTIN_JV_M_RECORDS : BUILTIN_JV_W_RECORDS); }
        catch(e) { return platformGender === 'M' ? BUILTIN_JV_M_RECORDS : BUILTIN_JV_W_RECORDS; }
    }
    function refreshStateRecords() {
        platformStateRecords = loadStateRecords();
        platformJvStateRecords = loadJvStateRecords();
    }
    function getAthleteRecords(designation) {
        return designation === 'JV' ? platformJvStateRecords : platformStateRecords;
    }
    function isStateRecordAttempt(weight, liftKey, weightClass, records) {
        if (!records || !weightClass || !liftKey || !weight) return false;
        const rec = records[String(weightClass)];
        if (!rec || !rec[liftKey]) return false;
        return weight > rec[liftKey].weight;
    }

    // ── Banners & confetti ─────────────────────────────────────────────────────
    let ptGoodLiftTimer = null, ptFailedTimer = null, ptStateRecordTimer = null;

    function showBanner(bannerId, subId, subText, duration) {
        const banner = document.getElementById(bannerId);
        const sub = document.getElementById(subId);
        if (sub) sub.textContent = subText;
        banner.classList.add('show');
        banner.style.animation = '';
        const timerVar = bannerId === 'ptGoodLiftBanner' ? 'ptGoodLiftTimer'
                       : bannerId === 'ptFailedBanner' ? 'ptFailedTimer' : 'ptStateRecordTimer';
        if (window[timerVar]) clearTimeout(window[timerVar]);
        window[timerVar] = setTimeout(() => {
            banner.style.animation = 'recordFadeOut 0.5s ease forwards';
            setTimeout(() => { banner.classList.remove('show'); banner.style.animation = ''; }, 500);
        }, duration);
    }

    function showGoodLiftBanner(name, liftName, weight) {
        showBanner('ptGoodLiftBanner', 'ptGoodLiftSub', `${name} — ${liftName} ${weight} lbs`, 2500);
    }
    function showFailedAttemptBanner(name, liftName, weight) {
        showBanner('ptFailedBanner', 'ptFailedSub', `${name} — ${liftName} ${weight} lbs`, 2500);
    }
    function showStateRecordBanner(name, liftName, weight) {
        showBanner('ptStateRecordBanner', 'ptStateRecordSub', `${name} — ${liftName} ${weight} lbs`, 3500);
    }

    function fireConfetti() {
        const duration = 2500;
        const end = Date.now() + duration;
        const colors = ['#a78bfa','#60a5fa','#f59e0b','#10b981','#ec4899'];
        (function frame() {
            confetti({ particleCount: 6, angle: 60,  spread: 55, origin: { x: 0 }, colors });
            confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors });
            if (Date.now() < end) requestAnimationFrame(frame);
        })();
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function renderAthletes(athletes) {
        const container = document.getElementById('athleteContainer');

        // Snapshot open expand IDs BEFORE clearing the container
        const openIds = new Set(
            Array.from(container.querySelectorAll('[id^="expand-"]'))
                .filter(el => el.style.display === 'block')
                .map(el => el.id)
        );

        container.innerHTML = '';

        const configStr = localStorage.getItem('trplConfig');
        let configuredSchool = '';
        if (configStr) {
            try { configuredSchool = (JSON.parse(configStr).schoolName || '').toLowerCase(); } catch(e) {}
        }

        athletes.forEach((a, i) => { a.sheetOrder = i; });

        if (!platformStateRecords) refreshStateRecords();

        const currentCol = getCurrentAttemptColumn(athletes);

        // ── Just-finished detection ───────────────────────────────────────────
        const currentLifter = athletes.find(a => hasPendingInColumn(a, currentCol));
        if (lastLiftingName && currentLifter?.name !== lastLiftingName) {
            const lastAthlete = athletes.find(a => a.name === lastLiftingName);
            if (lastAthlete && !hasPendingInColumn(lastAthlete, currentCol)) {
                justFinishedAthlete = lastAthlete;
                if (lastAthlete.name !== lastJustFinishedName) {
                    lastJustFinishedName = lastAthlete.name;
                    const lastVal = lastLiftingColumn ? lastAthlete[lastLiftingColumn] : null;
                    const colToKey  = { squat1:'sq', squat2:'sq', squat3:'sq', bench1:'bp', bench2:'bp', bench3:'bp', dead1:'dl', dead2:'dl', dead3:'dl' };
                    const colToName = { squat1:'Squat', squat2:'Squat', squat3:'Squat', bench1:'Bench', bench2:'Bench', bench3:'Bench', dead1:'Deadlift', dead2:'Deadlift', dead3:'Deadlift' };
                    const liftKey   = lastLiftingColumn ? colToKey[lastLiftingColumn]  : null;
                    const liftName  = lastLiftingColumn ? colToName[lastLiftingColumn] : null;
                    const liftWeight = lastVal ? parseFloat(lastVal.replace(/[xgXG]/g,'')) : 0;
                    if (lastVal && lastVal.toLowerCase().includes('g')) {
                        const isRecord = isStateRecordAttempt(liftWeight, liftKey, lastAthlete.weightClass, getAthleteRecords(lastAthlete.designation));
                        if (isRecord) {
                            showStateRecordBanner(lastAthlete.name, liftName, liftWeight);
                            justFinishedResult = 'record';
                        } else {
                            showGoodLiftBanner(lastAthlete.name, liftName, liftWeight);
                            justFinishedResult = 'good';
                        }
                        fireConfetti();
                    } else if (lastVal && lastVal.toLowerCase().includes('x')) {
                        showFailedAttemptBanner(lastAthlete.name, liftName, liftWeight);
                        justFinishedResult = 'failed';
                    }
                }
            }
        }
        if (currentLifter) {
            lastLiftingName = currentLifter.name;
            lastLiftingColumn = currentCol;
        }

        // ── Voice / Sound announce ────────────────────────────────────────────────
        const configStr2 = localStorage.getItem('trplConfig');
        let announcementName = '';
        let displayAthleteNameCfg = '';
        let announcementsOn = false, soundAlertsOn = false;
        if (configStr2) {
            try {
                const _acfg = JSON.parse(configStr2);
                announcementName = (_acfg.athleteName || '').toLowerCase().trim();
                displayAthleteNameCfg = _acfg.athleteName || '';
                announcementsOn = !!_acfg.announcementsEnabled;
                soundAlertsOn   = !!_acfg.soundNotificationsEnabled;
            } catch(e) {}
        }
        if ((announcementsOn || soundAlertsOn) && announcementName && platformLastAnnouncedStatus !== 'done') {
            const queue = athletes.filter(a => hasPendingInColumn(a, currentCol))
                .sort((a,b) => {
                    const aw = parseFloat((a[currentCol]||'').replace(/[xgXGfF]/g,'').trim())||0;
                    const bw = parseFloat((b[currentCol]||'').replace(/[xgXGfF]/g,'').trim())||0;
                    return aw - bw;
                });
            const idx = queue.findIndex(a => a.name.toLowerCase().trim() === announcementName);
            let newStatus = idx === 0 ? 'lifting' : idx === 1 ? 'on-deck' : null;
            if (newStatus && newStatus !== platformLastAnnouncedStatus) {
                if (newStatus === 'lifting' && justFinishedAthlete) {
                    // hold — wait for just-finished card to clear
                } else {
                    const prevStatus = platformLastAnnouncedStatus;
                    platformLastAnnouncedStatus = newStatus;
                    const displayName = queue[idx].name;
                    const text = newStatus === 'lifting'
                        ? `${displayName} is now lifting!`
                        : `${displayName} is on deck! Get ready!`;
                    if (soundAlertsOn) {
                        if (newStatus === 'lifting') triggerLiftingAlert();
                        else triggerOnDeckAlert();
                    }
                    if (announcementsOn) speakAnnouncement(text, prevStatus);
                }
            }
        }

        // ── My Athlete Panel ─────────────────────────────────────────────────────
        const myAthletePanel = document.getElementById('myAthletePanel');
        if (announcementName) {
            const myAthleteData = athletes.find(a => a.name.toLowerCase().includes(announcementName));
            if (myAthleteData) {
                const myQueuePos = athletes.filter(a => hasPendingInColumn(a, currentCol))
                    .sort((a,b) => {
                        const aw = parseFloat((a[currentCol]||'').replace(/[xgXGfF]/g,'').trim())||0;
                        const bw = parseFloat((b[currentCol]||'').replace(/[xgXGfF]/g,'').trim())||0;
                        return aw - bw;
                    })
                    .findIndex(a => a.name.toLowerCase().includes(announcementName));
                let statusLabel = '', statusColor = '';
                if (justFinishedAthlete && justFinishedAthlete.name.toLowerCase().includes(announcementName)) {
                    statusLabel = 'JUST FINISHED'; statusColor = '#a78bfa';
                } else if (myQueuePos === 0) {
                    statusLabel = 'LIFTING'; statusColor = '#ef4444';
                } else if (myQueuePos === 1) {
                    statusLabel = 'ON DECK'; statusColor = '#10b981';
                } else if (myQueuePos > 1) {
                    statusLabel = `#${myQueuePos + 1}`; statusColor = '#60a5fa';
                } else {
                    statusLabel = 'DONE'; statusColor = '#f97316';
                }
                const sel2 = document.getElementById('platformSelect');
                const selOpt = sel2.options[sel2.selectedIndex];
                const curPlatformName = selOpt ? (selOpt.dataset.baseName || selOpt.text) : '';
                myAthletePanel.style.display = 'block';
                myAthletePanel.innerHTML = buildMyAthletePanelHTML(myAthleteData, statusLabel, statusColor, displayAthleteNameCfg, curPlatformName, currentPlatformGid);
                document.getElementById('myAthleteTip').style.display = 'none';
                document.getElementById('onPlatformSeparator').style.display = 'flex';
                const _curPNum = curPlatformName ? (curPlatformName.match(/\d+/) || [''])[0] : '';
                document.getElementById('onPlatformName').textContent = _curPNum ? `  ·  ${_curPNum}` : '';
            }
            // athlete not on this platform — leave panel as-is (preloaded from their platform)
        } else {
            myAthletePanel.style.display = 'none';
            document.getElementById('onPlatformSeparator').style.display = 'none';
            document.getElementById('myAthleteTip').style.display = announcementName ? 'none' : 'block';
        }

        // Update event banner
        const banner = document.getElementById('eventBanner');
        const liftInfo = getLiftInfo(currentCol);
        if (liftInfo) {
            banner.style.display = 'block';
            banner.innerHTML = `<i class="${liftInfo.icon}" style="color:${liftInfo.color};margin-right:8px;"></i><span style="font-weight:800;color:${liftInfo.color};">${liftInfo.name.toUpperCase()}</span><span style="color:rgba(255,255,255,0.45);margin:0 8px;">·</span><span style="font-weight:700;color:rgba(255,255,255,0.6);">ATTEMPT ${liftInfo.attempt}</span>`;
        } else {
            banner.style.display = 'none';
        }

        // Always keep separator platform name in sync with selected platform
        const _selOpt = document.getElementById('platformSelect');
        const _opt = _selOpt ? _selOpt.options[_selOpt.selectedIndex] : null;
        const _pName = _opt ? (_opt.dataset.baseName || _opt.text) : '';
        const _nameEl = document.getElementById('onPlatformName');
        const _pNum = _pName ? (_pName.match(/\d+/) || [''])[0] : '';
        if (_nameEl) _nameEl.textContent = _pNum ? `  ·  ${_pNum}` : '';

        // Sort: pending in current column first by weight, then sheet order
        const sorted = [...athletes].sort((a, b) => {
            const ap = hasPendingInColumn(a, currentCol);
            const bp = hasPendingInColumn(b, currentCol);
            if (ap && !bp) return -1;
            if (!ap && bp) return 1;
            if (ap && bp && currentCol) {
                const aw = parseFloat(a[currentCol].replace(/[xgXGfF]/g,'').trim()) || 0;
                const bw = parseFloat(b[currentCol].replace(/[xgXGfF]/g,'').trim()) || 0;
                if (aw !== bw) return aw - bw;
            }
            return a.sheetOrder - b.sheetOrder;
        });

        const pending = sorted.filter(a => hasPendingInColumn(a, currentCol));

        if (pending.length === 0 && !justFinishedAthlete) {
            container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:40px 0;font-size:0.95rem;">No active lifts on this platform.</div>';
            return;
        }

        let html = '';

        // Just-finished card (pinned at top)
        if (justFinishedAthlete) {
            html += buildJustFinishedCard(justFinishedAthlete, justFinishedResult, configuredSchool);
            scheduleCardRemoval();
        }

        // Exclude just-finished from pending list
        const displayPending = justFinishedAthlete
            ? pending.filter(a => a.name !== justFinishedAthlete.name)
            : pending;

        if (displayPending.length === 0) {
            container.innerHTML = html;
            return;
        }

        // LIFTING + ON DECK in a responsive row
        html += `<div class="row g-3">`;

        // LIFTING (pos 1)
        const lifting = displayPending[0];
        const liftingMySchool = configuredSchool && lifting.school && lifting.school.toLowerCase().includes(configuredSchool);
        const hasOnDeck = !!displayPending[1];
        html += `<div class="${hasOnDeck ? 'col-12 col-md-6' : 'col-12'}">${buildLiftingCard(lifting, currentCol, liftingMySchool)}</div>`;

        // ON DECK (pos 2)
        if (hasOnDeck) {
            const onDeck = displayPending[1];
            const onDeckMySchool = configuredSchool && onDeck.school && onDeck.school.toLowerCase().includes(configuredSchool);
            html += `<div class="col-12 col-md-6">${buildOnDeckCard(onDeck, currentCol, onDeckMySchool)}</div>`;
        }

        html += `</div>`;

        // Next up (pos 3+)
        if (displayPending.length > 2) {
            html += `<div class="divider-label"><span>Next Up</span></div>`;
            for (let i = 2; i < displayPending.length; i++) {
                html += buildPositionRow(displayPending[i], currentCol, i + 1, configuredSchool);
            }
        }

        container.innerHTML = html;

        // Restore expanded state
        openIds.forEach(id => {
            const el = document.getElementById(id);
            const arrow = document.getElementById('arrow-' + id);
            if (el) el.style.display = 'block';
            if (arrow) arrow.style.transform = 'rotate(180deg)';
        });

        // Update dropdown option to show current weight class(es)
        updatePlatformDropdownLabel(pending);
    }

    function updatePlatformDropdownLabel(pending) {
        const sel = document.getElementById('platformSelect');
        const opt = sel.options[sel.selectedIndex];
        if (!opt || !opt.value || !opt.dataset.baseName) return;
        const wcs = [...new Set(pending.map(a => a.weightClass).filter(Boolean))];
        opt.dataset.wc = wcs.join(', ');
        opt.text = wcs.length ? `${opt.dataset.baseName}  ·  ${wcs.join(', ')} lb` : opt.dataset.baseName;
    }

    function toggleAutoRefresh() {
        initAudioCtx();
        const btn = document.getElementById('refreshToggle');
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
            btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF';
            btn.style.background = 'rgba(96,165,250,0.8)';
            localStorage.setItem('ptAutoRefresh', 'off');
        } else {
            const cfg = JSON.parse(localStorage.getItem('trplConfig') || '{}');
            const ms = (cfg.autoRefreshSeconds || 20) * 1000;
            autoRefreshInterval = setInterval(loadPlatformData, ms);
            btn.innerHTML = '<i class="fas fa-sync-alt fa-spin me-2"></i>Auto-Refresh: ON';
            btn.style.background = 'rgba(16,185,129,0.8)';
            localStorage.setItem('ptAutoRefresh', 'on');
            if (cfg.announcementsEnabled || cfg.soundNotificationsEnabled) {
                if (!platformSpeechPrimed) {
                    platformSpeechPrimed = true;
                    localStorage.setItem('platformVoicePrimed', 'on');
                    setVoiceActive(true);
                }
            }
            if (window.speechSynthesis && cfg.announcementsEnabled) {
                const primer = new SpeechSynthesisUtterance('');
                primer.volume = 0;
                primer.onstart = function() { if (platformSpeechPrimed) setVoiceActive(true); };
                window.speechSynthesis.speak(primer);
            }
            loadPlatformData();
        }
    }

    function updateCacheBadge(status, age) {
        const el = document.getElementById('cacheBadge');
        const ageStr = age ? ` · ${age}s old` : '';
        el.textContent = `Cache: ${status || '—'}${ageStr}`;
    }

    async function checkHeartbeat() {
        try {
            const r = await fetch('https://pllv4.streamwaveprod.com/cache/heartbeat.json?_=' + Date.now());
            if (!r.ok) return;
            const data = await r.json();
            const ageSecs = Math.floor(Date.now() / 1000) - data.ts;
            const btn = document.getElementById('refreshToggle');
            if (!btn) return;
            if (ageSecs > 30) {
                const mins = Math.floor(ageSecs / 60);
                const secs = ageSecs % 60;
                const ageStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
                btn.style.background = 'rgba(239,68,68,0.8)';
                btn.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>Data Stale · ${ageStr}`;
            } else {
                // Data is fresh — restore normal button appearance if it was showing stale
                if (btn.innerHTML.includes('Data Stale')) {
                    btn.style.background = 'rgba(96,165,250,0.8)';
                    const isOn = !!autoRefreshInterval;
                    btn.innerHTML = isOn
                        ? '<i class="fas fa-sync-alt fa-spin me-2"></i>Auto-Refresh: ON'
                        : '<i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF';
                }
            }
        } catch(e) { /* network error — ignore */ }
    }

    function loadPlatformsList() {
        const configStr = localStorage.getItem('trplConfig');
        if (!configStr) return;
        try {
            const config = JSON.parse(configStr);
            const sel = document.getElementById('platformSelect');
            const platforms = config.sheets.filter(s => s.name.toLowerCase().startsWith('platform'));
            sel.innerHTML = '<option value="">— Select Platform —</option>';
            platforms.forEach(p => {
                const o = document.createElement('option');
                o.value = p.gid;
                o.dataset.baseName = p.name;
                o.textContent = p.name;
                sel.appendChild(o);
            });

            fetch(`https://pllv4.streamwaveprod.com/cache/meta_${config.spreadsheetId}.html`)
                .then(r => r.text())
                .then(html => {
                    const m = html.match(/<title>([^<]+)<\/title>/);
                    if (m) {
                        const t = m[1].toLowerCase();
                        platformGender = t.includes('women') || t.includes('female') || t.includes('girls') ? 'W' : 'M';
                    }
                }).catch(() => {});

            // Preload weight classes for each platform option
            platforms.forEach(p => {
                const url = `https://pllv4.streamwaveprod.com/cache/sheet_${config.spreadsheetId}_${p.gid}.csv`;
                fetch(url).then(r => r.ok ? r.text() : null).then(csv => {
                    if (!csv) return;
                    const athletes = parseAthletes(parseCSV(csv));
                    const col = getCurrentAttemptColumn(athletes);
                    const wcs = [...new Set(
                        athletes.filter(a => hasPendingInColumn(a, col)).map(a => a.weightClass).filter(Boolean)
                    )];
                    const opt = Array.from(sel.options).find(o => o.value === p.gid);
                    if (!opt) return;
                    opt.dataset.wc = wcs.join(', ');
                    opt.text = wcs.length ? `${p.name}  ·  ${wcs.join(', ')} lb` : p.name;
                }).catch(() => {});
            });
        } catch(e) {}
    }

    function loadPlatform() {
        const sel = document.getElementById('platformSelect');
        platformLastAnnouncedStatus = null;
        // Rebuild all option labels preserving stored weight class
        Array.from(sel.options).forEach(o => {
            if (!o.dataset.baseName) return;
            o.text = o.dataset.wc ? `${o.dataset.baseName}  ·  ${o.dataset.wc} lb` : o.dataset.baseName;
        });
        currentPlatformGid = sel.value;

            document.getElementById('athleteContainer').innerHTML = '';

            return;
        }
        loadPlatformData();
    }

    async function loadPlatformData() {
        if (!currentPlatformGid) return;
        try {
            const config = JSON.parse(localStorage.getItem('trplConfig') || '{}');
            const url = `https://pllv4.streamwaveprod.com/cache/sheet_${config.spreadsheetId}_${currentPlatformGid}.csv`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(res.status);
            updateCacheBadge(res.headers.get('X-Cache'), res.headers.get('X-Cache-Age'));
            checkHeartbeat();
            const athletes = parseAthletes(parseCSV(await res.text()));
            if (athletes.length === 0) {
                document.getElementById('athleteContainer').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);padding:40px 0;">No athletes found.</div>';
                return;
            }
            window._lastAthletes = athletes;
            renderAthletes(athletes);
        } catch(e) {
            console.error('Load error:', e);
        }
    }

    function parseCSV(csv) {
        const lines = csv.split('\n');
        const result = [];
        for (let line of lines) {
            if (!line.trim()) continue;
            const values = [];
            let current = '', inQuotes = false;
            for (let j = 0; j < line.length; j++) {
                const c = line[j];
                if (c === '"') { inQuotes = !inQuotes; }
                else if (c === ',' && !inQuotes) { values.push(current.trim().replace(/^"|"$/g,'')); current = ''; }
                else { current += c; }
            }
            values.push(current.trim().replace(/^"|"$/g,''));
            result.push(values);
        }
        return result;
    }

    function parseAthletes(csvData) {
        const athletes = [];
        let headerRow = -1;
        let nameCol=-1, schoolCol=-1, weightClassCol=-1, bodyWeightCol=-1, designationCol=-1;
        let squat1Col=-1, squat2Col=-1, squat3Col=-1;
        let bench1Col=-1, bench2Col=-1, bench3Col=-1;
        let dead1Col=-1, dead2Col=-1, dead3Col=-1;
        let totalCol=-1;

        for (let i = 0; i < Math.min(15, csvData.length); i++) {
            const row = csvData[i];
            for (let j = 0; j < row.length; j++) {
                const cell = row[j].toLowerCase().trim();
                if ((cell==='name'||cell==='lifter') && nameCol===-1) nameCol=j;
                if (cell==='school' && schoolCol===-1) schoolCol=j;
                if ((cell==='weight class'||cell==='wt class'||cell==='wt. class'||cell==='class'||cell==='wc'||cell==='weight'||(cell.includes('wt')&&cell.includes('class'))) && weightClassCol===-1) weightClassCol=j;
                if ((cell==='body weight'||cell==='bw'||cell==='bodyweight'||cell==='weight') && bodyWeightCol===-1) bodyWeightCol=j;
                if ((cell==='designation'||cell==='div'||cell==='division'||cell==='desig') && designationCol===-1) designationCol=j;
                if ((cell==='squat 1'||cell==='sq1'||cell==='squat1'||cell==='f') && squat1Col===-1) squat1Col=j;
                if ((cell==='squat 2'||cell==='sq2'||cell==='squat2') && squat2Col===-1) squat2Col=j;
                if ((cell==='squat 3'||cell==='sq3'||cell==='squat3') && squat3Col===-1) squat3Col=j;
                if ((cell==='bench 1'||cell==='bp1'||cell==='bench1') && bench1Col===-1) bench1Col=j;
                if ((cell==='bench 2'||cell==='bp2'||cell==='bench2') && bench2Col===-1) bench2Col=j;
                if ((cell==='bench 3'||cell==='bp3'||cell==='bench3') && bench3Col===-1) bench3Col=j;
                if ((cell==='deadlift 1'||cell==='dead 1'||cell==='dl1'||cell==='deal lift 1') && dead1Col===-1) dead1Col=j;
                if ((cell==='deadlift 2'||cell==='dead 2'||cell==='dl2'||cell==='dead lift 2') && dead2Col===-1) dead2Col=j;
                if ((cell==='deadlift 3'||cell==='dead 3'||cell==='dl3'||cell==='dead lift 3') && dead3Col===-1) dead3Col=j;
                if (cell==='total' && totalCol===-1) totalCol=j;
            }
            if (nameCol!==-1 && schoolCol!==-1) { headerRow=i; break; }
        }

        if (headerRow===-1) {
            headerRow=7; nameCol=7; schoolCol=5; weightClassCol=3; bodyWeightCol=6;
            squat1Col=8; squat2Col=9; squat3Col=10;
            bench1Col=12; bench2Col=13; bench3Col=14;
            dead1Col=16; dead2Col=17; dead3Col=18; totalCol=20;
        } else {
            function scanSub(row) {
                for (let j=0; j<row.length; j++) {
                    const cell=row[j].toLowerCase().trim();
                    if ((cell==='squat 1'||cell==='sq1'||cell==='sq 1'||cell==='squat1')&&squat1Col===-1) squat1Col=j;
                    if ((cell==='squat 2'||cell==='sq2'||cell==='sq 2'||cell==='squat2')&&squat2Col===-1){squat2Col=j;if(squat1Col===-1&&j>0)squat1Col=j-1;}
                    if ((cell==='squat 3'||cell==='sq3'||cell==='sq 3'||cell==='squat3')&&squat3Col===-1) squat3Col=j;
                    if ((cell==='bench 1'||cell==='bp1'||cell==='bp 1'||cell==='bench1')&&bench1Col===-1) bench1Col=j;
                    if ((cell==='bench 2'||cell==='bp2'||cell==='bp 2'||cell==='bench2')&&bench2Col===-1){bench2Col=j;if(bench1Col===-1&&j>0)bench1Col=j-1;}
                    if ((cell==='bench 3'||cell==='bp3'||cell==='bp 3'||cell==='bench3')&&bench3Col===-1) bench3Col=j;
                    if ((cell==='dead lift 1'||cell==='dl1'||cell==='dl 1'||cell==='deadlift 1'||cell==='dead 1')&&dead1Col===-1) dead1Col=j;
                    if ((cell==='dead lift 2'||cell==='dl2'||cell==='dl 2'||cell==='deadlift 2'||cell==='dead 2')&&dead2Col===-1){dead2Col=j;if(dead1Col===-1&&j>0)dead1Col=j-1;}
                    if ((cell==='dead lift 3'||cell==='dl3'||cell==='dl 3'||cell==='deadlift 3'||cell==='dead 3')&&dead3Col===-1) dead3Col=j;
                }
            }
            if (csvData[headerRow+1]) { scanSub(csvData[headerRow+1]); headerRow++; }
            if (squat1Col===-1&&bench1Col===-1&&dead1Col===-1&&csvData[headerRow+1]) { scanSub(csvData[headerRow+1]); headerRow++; }
        }

        for (let i=headerRow+1; i<csvData.length; i++) {
            const row=csvData[i];
            if (row.length<=nameCol) continue;
            const name=row[nameCol]?.trim();
            if (!name) continue;
            const school=schoolCol!==-1?row[schoolCol]?.trim():'';
            let wcRaw=weightClassCol!==-1?row[weightClassCol]?.trim():'';
            const rawDesig=designationCol!==-1?(row[designationCol]?.trim()||''):'';
            const designation=rawDesig.toUpperCase().includes('JV')||(wcRaw&&wcRaw.toUpperCase().includes('JV'))?'JV':'V';
            let wc=wcRaw; if(wc){const m=wc.match(/(\d+)/);if(m)wc=m[1];}
            athletes.push({
                name, school, designation, weightClass:wc,
                bodyWeight: bodyWeightCol!==-1?parseFloat(row[bodyWeightCol])||0:0,
                squat1:squat1Col!==-1?row[squat1Col]?.trim():'',
                squat2:squat2Col!==-1?row[squat2Col]?.trim():'',
                squat3:squat3Col!==-1?row[squat3Col]?.trim():'',
                bench1:bench1Col!==-1?row[bench1Col]?.trim():'',
                bench2:bench2Col!==-1?row[bench2Col]?.trim():'',
                bench3:bench3Col!==-1?row[bench3Col]?.trim():'',
                dead1:dead1Col!==-1?row[dead1Col]?.trim():'',
                dead2:dead2Col!==-1?row[dead2Col]?.trim():'',
                dead3:dead3Col!==-1?row[dead3Col]?.trim():'',
                total:totalCol!==-1?parseFloat(row[totalCol])||0:0
            });
        }
        return athletes;
    }

    function getCurrentAttemptColumn(athletes) {
        const cols = ['squat1','squat2','squat3','bench1','bench2','bench3','dead1','dead2','dead3'];
        for (const col of cols) {
            if (athletes.some(a => { const v=a[col]; if(!v) return false; const l=v.toLowerCase(); return !l.includes('g')&&!l.includes('x'); })) return col;
        }
        return null;
    }

    function hasPendingInColumn(athlete, column) {
        if (!column) return false;
        const v=athlete[column]; if (!v) return false;
        const l=v.toLowerCase(); return !l.includes('g')&&!l.includes('x');
    }

    async function preloadMyAthletePanel() {
        const configStr = localStorage.getItem('trplConfig');
        if (!configStr) return;
        let config, announcementName, displayAthleteNameCfg;
        try {
            config = JSON.parse(configStr);
            announcementName = (config.athleteName || '').toLowerCase().trim();
            displayAthleteNameCfg = config.athleteName || '';
        } catch(e) { return; }
        if (!announcementName || !config.spreadsheetId) return;

        // Try stored platform first, then scan all platforms
        const stored = (() => { try { return JSON.parse(localStorage.getItem('myAthletePlatform') || 'null'); } catch(e) { return null; } })();
        const platforms = (config.sheets || []).filter(s => s.name.toLowerCase().startsWith('platform'));
        const candidates = stored
            ? [stored, ...platforms.filter(p => p.gid !== stored.gid)]
            : platforms;

        for (const p of candidates) {
            const gid = p.gid || p;
            try {
                const url = `https://pllv4.streamwaveprod.com/cache/sheet_${config.spreadsheetId}_${gid}.csv`;
                const res = await fetch(url);
                if (!res.ok) continue;
                const athletes = parseAthletes(parseCSV(await res.text()));
                const myAthleteData = athletes.find(a => a.name.toLowerCase().includes(announcementName));
                if (!myAthleteData) continue;

                // Found — render panel (no status since we don't know queue without currentCol context)
                const currentCol = getCurrentAttemptColumn(athletes);
                const queue = athletes.filter(a => hasPendingInColumn(a, currentCol))
                    .sort((a, b) => {
                        const aw = parseFloat((a[currentCol]||'').replace(/[xgXGfF]/g,'').trim())||0;
                        const bw = parseFloat((b[currentCol]||'').replace(/[xgXGfF]/g,'').trim())||0;
                        return aw - bw;
                    });
                const myQueuePos = queue.findIndex(a => a.name.toLowerCase().includes(announcementName));
                let statusLabel = '', statusColor = '';
                if (myQueuePos === 0)      { statusLabel = 'LIFTING';  statusColor = '#ef4444'; }
                else if (myQueuePos === 1) { statusLabel = 'ON DECK';  statusColor = '#10b981'; }
                else if (myQueuePos > 1)   { statusLabel = `#${myQueuePos + 1}`; statusColor = '#60a5fa'; }
                else                       { statusLabel = 'DONE';     statusColor = '#f97316'; }

                const panel = document.getElementById('myAthletePanel');
                panel.style.display = 'block';
                panel.innerHTML = buildMyAthletePanelHTML(myAthleteData, statusLabel, statusColor, displayAthleteNameCfg, p.name || '', gid);
                document.getElementById('onPlatformSeparator').style.display = 'flex';
                const _preloadNameEl = document.getElementById('onPlatformName');
                if (_preloadNameEl) _preloadNameEl.textContent = '';
                return; // stop after first platform where athlete is found
            } catch(e) { continue; }
        }
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', function() {
        refreshStateRecords();
        const _cfg = JSON.parse(localStorage.getItem('trplConfig') || '{}');
        if (_cfg.announcementsEnabled || _cfg.soundNotificationsEnabled) {
            document.getElementById('voiceBtn').style.display = 'flex';
            if (localStorage.getItem('platformVoicePrimed') === 'on') {
                platformSpeechPrimed = true;
                setVoiceActive(true);
            } else {
                setVoiceActive(false);
            }
        }
        loadPlatformsList();
        preloadMyAthletePanel();
        const gid = new URLSearchParams(window.location.search).get('gid');
        if (gid) {
            const sel = document.getElementById('platformSelect');
            sel.value = gid;
            if (sel.value) loadPlatform();
        }
        if (localStorage.getItem('ptAutoRefresh') === 'on') toggleAutoRefresh();
    });
</script>
</body>
</html>
